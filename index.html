<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polish Club Pro v2.2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0B0F19;
            --card-bg: #151A27;
            --text-main: #FFFFFF;
            --text-muted: #64748B;
            --accent: #3B82F6;
            --correct: #10B981;
            --warning: #F59E0B;
            --error: #FF3B30; 
            --btn-bg: #1E293B;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .tabs { display: flex; width: 100%; background: #0F172A; border-bottom: 1px solid #1E293B; position: fixed; top: 0; z-index: 10; }
        .tab { flex: 1; padding: 18px 0; text-align: center; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: 0.2s; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab.active { color: var(--text-main); border-bottom: 3px solid var(--accent); }

        .container { width: 92%; max-width: 450px; text-align: center; margin-top: 80px; display: flex; flex-direction: column; height: calc(100vh - 85px); box-sizing: border-box; }
        
        .mode-tabs { display: flex; width: 100%; gap: 6px; margin-bottom: 15px; }
        .mode-btn { flex: 1; background: var(--btn-bg); color: var(--text-muted); border: 1px solid #1E293B; padding: 12px 2px; border-radius: 12px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 5px; }
        .stats-label { font-size: 0.7rem; color: var(--text-muted); font-weight: bold; }
        .lives { color: var(--error); font-size: 1.1rem; }

        .timer-container { width: 100%; height: 6px; background: #0F172A; border-radius: 3px; overflow: hidden; margin-bottom: 15px; display: none; }
        .timer-bar { height: 100%; width: 100%; background: var(--correct); transition: width 0.1s linear; }

        .word-card { background: var(--card-bg); padding: 30px 20px; border-radius: 24px; border: 1px solid #1E293B; margin-bottom: 15px; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .word-card h1 { margin: 0; font-size: 1.8rem; font-weight: 700; line-height: 1.2; transition: font-size 0.2s; }
        .word-card h1.small-font { font-size: 1.4rem; }
        .speaker-icon { margin-top: 15px; font-size: 1.4rem; cursor: pointer; background: #1E293B; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .sentence-slots { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; min-height: 45px; margin-bottom: 20px; padding: 10px; border-bottom: 2px dashed #1E293B; }
        .tile { background: var(--btn-bg); border: 1px solid #334155; padding: 10px 14px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: 0.1s; }
        .tile.used { opacity: 0.2; pointer-events: none; }
        .tile.placed { background: var(--accent); border-color: var(--accent); }
        
        .correct-hint-box { display: none; margin-bottom: 15px; padding: 15px; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--correct); border-radius: 12px; color: var(--correct); font-weight: 600; font-size: 0.85rem; text-align: center; animation: fadeIn 0.3s; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button.option-btn { border: 1px solid #1E293B; padding: 16px; border-radius: 14px; font-size: 1.05rem; font-weight: 600; cursor: pointer; background: var(--btn-bg); color: #FFFFFF; width: 100%; }
        
        .action-btn { background: var(--accent); color: #fff; border: none; padding: 22px 30px; border-radius: 16px; font-weight: 800; font-size: 1.1rem; cursor: pointer; }

        .fab-mistakes { position: fixed; bottom: 25px; right: 20px; background: var(--error); color: #fff; padding: 16px 24px; border-radius: 35px; font-weight: 800; font-size: 0.9rem; cursor: pointer; z-index: 50; display: none; align-items: center; gap: 8px; box-shadow: 0 8px 25px rgba(255, 59, 48, 0.4); border: none; }

        #stats-page { overflow-y: auto; display: none; text-align: left; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #1E293B; padding: 15px; border-radius: 18px; }
        .stat-box h3 { margin: 0; font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-box .value { font-size: 1.3rem; font-weight: 800; margin-top: 4px; }

        .leaderboard-title { margin: 30px 0 80px 0; font-size: 1rem; color: var(--accent); text-transform: uppercase; font-weight: 900; text-align: center; letter-spacing: 2px; }
        .leader-row { display: flex; justify-content: space-between; padding: 15px; background: rgba(255,255,255,0.04); border-radius: 14px; margin-bottom: 8px; }
        
        .reset-btn { background: var(--error); padding: 28px; width: 100%; border-radius: 20px; font-size: 1.1rem; margin: 40px 0; border: none; color: #fff; font-weight: 900; }

        #message-screen { display: none; flex-direction: column; align-items: center; justify-content: center; }
        .msg-cat { width: 180px; border-radius: 25px; margin-bottom: 20px; }

        .cat-bad-popup { position: fixed; bottom: 95px; right: 20px; width: 165px; background: var(--card-bg); border-radius: 25px; padding: 12px; border: 2px solid var(--error); transform: translateY(350%); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; }
        .cat-bad-popup.show { transform: translateY(0); }
        .cat-bad-popup img { width: 100%; border-radius: 15px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" id="tab-play" onclick="switchTab('play')">Прогресс</div>
        <div class="tab" id="tab-stats" onclick="switchTab('stats')">Статистика</div>
    </div>

    <div class="container" id="game-container">
        <div class="mode-tabs">
            <button class="mode-btn active" id="btn-classic" onclick="setMode('classic')">Слова</button>

            <button class="mode-btn" id="btn-audio" onclick="setMode('audio')">Аудио</button>
            <button class="mode-btn" id="btn-sprint" onclick="setMode('sprint')">Спринт</button>
        </div>
        <div class="header-info">
            <div class="stats-label" id="stats-header">УРОВЕНЬ 1</div>
            <div class="lives" id="lives">🤍🤍</div>
        </div>
        <div class="timer-container" id="timer-container"><div class="timer-bar" id="timer-bar"></div></div>
        
        <div class="word-card">
            <h1 id="word">Загрузка...</h1>
            <div class="speaker-icon" id="speak-btn" onclick="speakCurrent()">🔊</div>
        </div>

        <div id="phrase-builder-ui" style="display:none">
            <div class="sentence-slots" id="slots-container"></div>
            <div class="btn-group" style="flex-direction:row; flex-wrap:wrap; justify-content:center; gap:8px" id="tiles-container"></div>
            <div class="correct-hint-box" id="correct-hint"></div>
            <button class="action-btn" style="width:100%" onclick="checkSentence()">Проверить</button>
        </div>

        <div class="btn-group" id="options-container"></div>
    </div>

    <div class="container" id="mistakes-screen" style="display:none">
        <div class="header-info"><div class="stats-label">РАБОТА НАД ОШИБКАМИ</div></div>
        <div class="word-card"><h1 id="m-word">...</h1><div class="speaker-icon" onclick="speakMistake()">🔊</div></div>
        <div class="btn-group" id="m-options-container"></div>
        <button class="action-btn" style="background:#334155; margin-top:20px" onclick="closeMistakes()">Выйти</button>
    </div>

    <div class="container" id="stats-page">
        <div class="stat-grid">
            <div class="stat-box"><h3>Опыт</h3><p id="st-xp" class="value">0 XP</p></div>
            <div class="stat-box"><h3>Уровень</h3><p id="st-level" class="value">1</p></div>
            <div class="stat-box"><h3>Слов</h3><p id="st-words" class="value">0</p></div>
            <div class="stat-box"><h3>Фраз</h3><p id="st-phrases" class="value">0</p></div>
        </div>
        <div class="leaderboard-title">ТОП ПШЕКОВ 🏆</div>
        <div id="leaderboard-list"></div>
        <button class="reset-btn" onclick="resetProgress()">СБРОСИТЬ ПРОГРЕСС</button>
    </div>

    <div class="container" id="message-screen">
        <img id="msg-cat-img" src="good.png" class="msg-cat">
        <h2 id="msg-title"></h2>
        <p id="msg-desc"></p>
        <button class="action-btn" onclick="nextAction()">Продолжить</button>
    </div>

        function switchTab(tab) {
            clearInterval(timerInterval);
            document.getElementById('game-container').style.display = tab === 'play' ? 'flex' : 'none';
            document.getElementById('stats-page').style.display = tab === 'stats' ? 'flex' : 'none';
            document.getElementById('message-screen').style.display = 'none';
            document.getElementById('mistakes-screen').style.display = 'none';
            
            document.getElementById('tab-play').classList.toggle('active', tab === 'play');
            document.getElementById('tab-stats').classList.toggle('active', tab === 'stats');

            if (tab === 'stats') {
                updateStatsUI();
                syncWithCloud().then(fetchLeaderboard);
            } else {
                startLevel();
            }
        }

        function updateStatsUI() {
            document.getElementById('st-xp').innerText = stats.xp + ' XP';
            document.getElementById('st-level').innerText = currentLevel + 1;
            document.getElementById('st-words').innerText = stats.words;
            document.getElementById('st-phrases').innerText = stats.phrases;
            document.getElementById('fab-count').innerText = mistakesDb.length;
            document.getElementById('fab-mistakes').style.display = (mistakesDb.length > 0 && document.getElementById('stats-page').style.display !== 'flex') ? 'flex' : 'none';
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            document.getElementById('timer-container').style.display = mode === 'sprint' ? 'block' : 'none';
            startLevel();
        }

        function startLevel() {
            wordIndex = 0; mistakesMade = 0;

            document.getElementById('phrase-builder-ui').style.display = 'none';
            document.getElementById('options-container').style.display = 'flex';
            document.getElementById('message-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            nextQuestion();
        }

                return;
            }
            isWaiting = false;
            document.getElementById('correct-hint').style.display = 'none';
            const cur = levelItems[wordIndex];
            
            if (currentMode === 'phrases') {
                renderPhrasesMode(cur);
            } else {
                renderWordsMode(cur);
            }
            updateHeader();
        }

        function renderWordsMode(cur) {
            const askRu = currentMode === 'audio' ? false : Math.random() > 0.5;
            const wordEl = document.getElementById('word');
            wordEl.classList.remove('small-font');
            document.getElementById('speak-btn').style.display = 'flex';
            
            wordEl.innerText = currentMode === 'audio' ? '🎧' : (askRu ? cur.ru : cur.pl);
            wordEl.dataset.val = (currentMode === 'audio' || !askRu) ? cur.pl : cur.ru;
            wordEl.dataset.lang = (currentMode === 'audio' || !askRu) ? 'pl-PL' : 'ru-RU';
            
            // Если слово на польском — озвучиваем сразу
            if (currentMode === 'audio' || !askRu) speakCurrent();
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            let target = askRu ? 'pl' : 'ru';
            let wr = shuffle(allWordsFlat.filter(w => w[target] !== cur[target])).slice(0, 2);
            let opts = shuffle([cur[target], wr[0][target], wr[1][target]]);
            
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = o;
                b.onclick = () => {
                    // Если мы выбираем польское слово — озвучиваем его при клике
                    if (target === 'pl') speakText(o, 'pl-PL');
                    checkWordAnswer(b, o, cur[target], cur);
                };
                container.appendChild(b);
            });

            if (currentMode === 'sprint') startSprintTimer(cur, target);
        }

        function renderPhrasesMode(cur) {
            document.getElementById('options-container').style.display = 'none';
            document.getElementById('phrase-builder-ui').style.display = 'block';
            document.getElementById('speak-btn').style.display = 'none';
            document.getElementById('word').classList.add('small-font');

            const isMissingWordMode = Math.random() > 0.6;
            selectedPhraseWords = [];
            const slots = document.getElementById('slots-container');
            const tiles = document.getElementById('tiles-container');
            slots.innerHTML = ''; tiles.innerHTML = '';

            const correctWords = cur.pl.replace(/[.?!,]/g, '').split(' ');

            if (isMissingWordMode) {
                const idx = Math.floor(Math.random() * correctWords.length);
                const missing = correctWords[idx];
                document.getElementById('word').innerText = "Вставь пропущенное:";
                correctWords.forEach((w, i) => {
                    const s = document.createElement('div');
                    s.className = 'tile placed';
                    s.innerText = (i === idx) ? '___' : w;
                    slots.appendChild(s);
                });
                renderTiles([missing, ...shuffle(allWordsFlat).slice(0, 5).map(x => x.pl)], missing);
            } else {
                document.getElementById('word').innerText = cur.ru;
                renderTiles([...correctWords, ...shuffle(allWordsFlat).slice(0, 4).map(x => x.pl)], correctWords);
            }
        }

        function renderTiles(pool, correct) {
            const container = document.getElementById('tiles-container');
            shuffle(pool).forEach(w => {
                const t = document.createElement('div');
                t.className = 'tile';
                t.innerText = w;
                t.onclick = () => {
                    if (t.classList.contains('used')) return;
                    speakText(w, 'pl-PL'); // Озвучка при нажатии плитки
                    t.classList.add('used');
                    addWordToSentence(w, t);
                };
                container.appendChild(t);
            });
        }

        function addWordToSentence(word, tileRef) {
            const slots = document.getElementById('slots-container');
            const s = document.createElement('div');
            s.className = 'tile placed';
            s.innerText = word;
            s.onclick = () => { s.remove(); tileRef.classList.remove('used'); selectedPhraseWords = selectedPhraseWords.filter(x => x !== word); };
            slots.appendChild(s);
            selectedPhraseWords.push(word);
        }

        function checkSentence() {
            const cur = levelItems[wordIndex];
            const result = selectedPhraseWords.join(' ').toLowerCase().replace(/[.?!,]/g, '');
            const target = cur.pl.toLowerCase().replace(/[.?!,]/g, '');

            if (result === target || (target.includes(result) && result.length > 5)) {
                stats.xp += 5; stats.phrases++;
                saveStats();
                wordIndex++;
                setTimeout(nextQuestion, 600);
            } else {
                showBadCat();
                document.getElementById('correct-hint').innerText = "Правильно: " + cur.pl;
                document.getElementById('correct-hint').style.display = 'block';
                mistakesMade++;
                if (mistakesMade > 2) setTimeout(() => showMsg("Провал", "Попробуй еще раз!", startLevel, false), 2000);
            }
        }

        function checkWordAnswer(btn, sel, target, curObj) {
            if (isWaiting) return; isWaiting = true;
            clearInterval(timerInterval);
            if (sel === target) {
                if (btn) btn.classList.add('correct');
                stats.xp += 1; stats.words++;
                saveStats();
                wordIndex++; setTimeout(nextQuestion, 600);
            } else {
                if (btn) btn.classList.add('wrong');
                showBadCat();
                addMistake(curObj);
                mistakesMade++;
                if (mistakesMade > 1) setTimeout(() => showMsg("Провал", "Слишком много ошибок", startLevel, false), 800);
                else { wordIndex++; setTimeout(nextQuestion, 1200); }
            }
        }

        function addMistake(item) {
            if (!mistakesDb.some(m => m.pl === item.pl)) {
                mistakesDb.push(item);
                localStorage.setItem('pl_mistakes_v2', JSON.stringify(mistakesDb));
                updateStatsUI();
            }
        }

        function openMistakes() {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('mistakes-screen').style.display = 'flex';
            document.getElementById('fab-mistakes').style.display = 'none';
            wordIndex = 0; levelItems = shuffle([...mistakesDb]);
            renderMistakeQuestion();
        }

        function renderMistakeQuestion() {
            if (wordIndex >= levelItems.length || mistakesDb.length === 0) { closeMistakes(); return; }
            isWaiting = false;
            const cur = levelItems[wordIndex];
            document.getElementById('m-word').innerText = cur.pl;
            speakText(cur.pl, 'pl-PL');
            const container = document.getElementById('m-options-container');
            container.innerHTML = '';
            let wr = shuffle(allWordsFlat.filter(w => w.ru !== cur.ru)).slice(0, 2);
            let opts = shuffle([cur.ru, wr[0].ru, wr[1].ru]);
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = o;
                b.onclick = () => {
                    if (o === cur.ru) {
                        b.classList.add('correct');
                        mistakesDb = mistakesDb.filter(m => m.pl !== cur.pl);
                        localStorage.setItem('pl_mistakes_v2', JSON.stringify(mistakesDb));
                        wordIndex++; setTimeout(renderMistakeQuestion, 600);
                    } else { b.classList.add('wrong'); }
                    updateStatsUI();
                };
                container.appendChild(b);
            });
        }

        function closeMistakes() { document.getElementById('mistakes-screen').style.display = 'none'; startLevel(); updateStatsUI(); }

        function saveStats() {
            localStorage.setItem('pl_stats_v2', JSON.stringify(stats));
            updateStatsUI();
            if (stats.xp % 5 === 0) syncWithCloud();
        }

        function updateHeader() {
            document.getElementById('stats-header').innerText = `УРОВЕНЬ ${currentLevel + 1} (${wordIndex}/${levelItems.length})`;
            document.getElementById('lives').innerText = mistakesMade === 0 ? '🤍🤍' : (mistakesMade === 1 ? '🤍' : '💔');
        }

        async function fetchLeaderboard() {
            const { data } = await sb.from('leaderboard').select('*').order('xp', { ascending: false }).limit(10);
            document.getElementById('leaderboard-list').innerHTML = data.map((u, i) => `
                <div class="leader-row" style="${u.username === userName ? 'border-color:var(--accent); background:rgba(59,130,246,0.1)' : ''}">
                    <span>${i+1}. ${u.username}</span>
                    <span class="leader-score">${u.xp || 0} XP</span>
                </div>
            `).join('');
        }

        function startSprintTimer(cur, target) {
            let start = Date.now();
            let bar = document.getElementById('timer-bar');
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let p = 100 - ((Date.now() - start) / 7000 * 100);
                bar.style.width = p + '%';
                if (p <= 0) { clearInterval(timerInterval); checkWordAnswer(null, '', target, cur); }
            }, 50);
        }

        function showBadCat() {
            const c = document.getElementById('cat-bad');
            c.classList.add('show');
            setTimeout(() => c.classList.remove('show'), 2500);
        }

        function showMsg(t, d, action, isWin) {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('message-screen').style.display = 'flex';
            document.getElementById('msg-title').innerText = t;
            document.getElementById('msg-desc').innerText = d;
            document.getElementById('msg-cat-img').src = isWin ? 'good.png' : 'bad.png';
            window.nextAction = action;
        }

        function speakCurrent() {
            const el = document.getElementById('word');
            speakText(el.dataset.val || el.innerText, el.dataset.lang || 'pl-PL');
        }

        function speakMistake() { speakText(document.getElementById('m-word').innerText, 'pl-PL'); }

        function speakText(t, l) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = l;
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function shuffle(a) { return a.sort(() => Math.random() - 0.5); }
        function resetProgress() { if(confirm("Сбросить всё?")) { localStorage.clear(); location.reload(); } }

        startLevel();
        updateStatsUI();
    </script>
</body>
</html>
