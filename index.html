<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panamket Pro v4.0 - Full Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0B0F19; --card-bg: #151A27; --text-main: #FFFFFF;
            --text-muted: #64748B; --accent: #3B82F6; --correct: #10B981;
            --error: #FF3B30; --btn-bg: #1E293B;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
            -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation;
        }

        .tabs { display: flex; width: 100%; background: #0F172A; border-bottom: 1px solid #1E293B; position: fixed; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 18px 0; text-align: center; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab.active { color: var(--text-main); border-bottom: 3px solid var(--accent); }

        .container { 
            width: 92%; max-width: 450px; text-align: center; margin-top: 80px; 
            display: flex; flex-direction: column; height: calc(100vh - 100px); 
            box-sizing: border-box; padding-bottom: 80px;
        }
        
        .mode-tabs { display: flex; width: 100%; gap: 6px; margin-bottom: 15px; flex-shrink: 0; }
        .mode-btn { flex: 1; background: var(--btn-bg); color: var(--text-muted); border: 1px solid #1E293B; padding: 12px 2px; border-radius: 12px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .is-pressed { box-shadow: inset 0 0 0 3px #FFFFFF !important; transform: scale(0.96); transition: none !important; }
        .is-correct { border-color: var(--correct) !important; background: rgba(16, 185, 129, 0.2) !important; color: var(--correct) !important; }
        .is-wrong { border-color: var(--error) !important; background: rgba(255, 59, 48, 0.2) !important; color: var(--error) !important; animation: shake 0.3s; }

        .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-shrink: 0; }
        .stats-label { font-size: 0.7rem; color: var(--text-muted); font-weight: bold; }
        .lives { color: var(--error); font-size: 1.1rem; }

        .word-card { background: var(--card-bg); padding: 25px 20px; border-radius: 24px; border: 1px solid #1E293B; margin-bottom: 15px; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        .word-card h1 { margin: 0; font-size: 1.7rem; font-weight: 700; }
        .speaker-icon { margin-top: 10px; font-size: 1.2rem; cursor: pointer; background: #1E293B; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        #interests-setup { display: none; flex-direction: column; align-items: center; width: 100%; }
        .interest-item { display: flex; align-items: center; background: var(--card-bg); padding: 15px; border-radius: 18px; margin-bottom: 10px; border: 1px solid #1E293B; width: 100%; box-sizing: border-box; text-align: left; }
        .interest-item input { width: 22px; height: 22px; margin-right: 15px; accent-color: var(--accent); }

        .sentence-slots { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; min-height: 45px; margin-bottom: 15px; padding: 10px; border-bottom: 1px dashed #1E293B; }
        .tile { background: var(--btn-bg); border: 1px solid #334155; padding: 10px 14px; border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        .tile.used { opacity: 0.15; pointer-events: none; }
        .tile.placed { background: var(--accent); border-color: var(--accent); color: white; }
        .tile.placeholder { background: transparent !important; border: 2px dashed rgba(255,255,255,0.15) !important; min-width: 70px; color: transparent; pointer-events: none; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        button.option-btn { border: 1px solid #1E293B; padding: 18px; border-radius: 15px; font-size: 1.05rem; font-weight: 600; cursor: pointer; background: var(--btn-bg); color: #FFFFFF; width: 100%; transition: 0.1s; }
        .action-btn { background: var(--accent); color: #fff; border: none; padding: 22px 30px; border-radius: 18px; font-weight: 800; font-size: 1.1rem; cursor: pointer; width: 100%; }

        .fab-mistakes { position: fixed; bottom: 20px; right: 20px; background: var(--error); color: #fff; padding: 14px 22px; border-radius: 30px; font-weight: 800; font-size: 0.85rem; cursor: pointer; z-index: 200; display: none; align-items: center; gap: 8px; box-shadow: 0 8px 20px rgba(255, 59, 48, 0.4); border: none; }

        #stats-page { overflow-y: auto; display: none; text-align: left; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #1E293B; padding: 15px; border-radius: 18px; }
        .stat-box h3 { margin: 0; font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-box .value { font-size: 1.3rem; font-weight: 800; margin-top: 4px; }
        .leaderboard-title { margin: 25px 0 20px 0; font-size: 1rem; color: var(--accent); text-transform: uppercase; font-weight: 900; text-align: center; }
        .leader-row { display: flex; justify-content: space-between; padding: 14px; background: rgba(255,255,255,0.04); border-radius: 14px; margin-bottom: 8px; }

        #message-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: fixed; top:0; left:0; width:100%; background: var(--bg-color); z-index: 1000; }
        .msg-cat { width: 160px; border-radius: 25px; margin-bottom: 20px; }

        @keyframes shake { 10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(3px); } }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" id="tab-play" onclick="switchTab('play')">Прогресс</div>
        <div class="tab" id="tab-stats" onclick="switchTab('stats')">Статистика</div>
    </div>

    <div class="container" id="game-container">
        <div class="mode-tabs">
            <button class="mode-btn active" id="btn-classic" onclick="setMode('classic')">Слова</button>
            <button class="mode-btn" id="btn-phrases" onclick="setMode('phrases')">Фразы</button>
            <button class="mode-btn" id="btn-audio" onclick="setMode('audio')">Аудио</button>
            <button class="mode-btn" style="background:rgba(59, 130, 246, 0.2)" id="btn-interests" onclick="setMode('interests')">🎯 Темы</button>
        </div>

        <div id="main-game-ui" style="width:100%; display:flex; flex-direction:column;">
            <div class="header-info">
                <div class="stats-label" id="stats-header">УРОВЕНЬ 1</div>
                <div class="lives" id="lives">🤍🤍</div>
            </div>
            <div class="word-card">
                <h1 id="word">Загрузка...</h1>
                <div class="speaker-icon" id="speak-btn" onclick="speakCurrent()">🔊</div>
            </div>
            <div id="phrase-builder-ui" style="display:none; flex-direction: column; flex-grow:1;">
                <div class="sentence-slots" id="slots-container"></div>
                <div class="btn-group" style="flex-direction:row; flex-wrap:wrap; justify-content:center; gap:8px;" id="tiles-container"></div>
                <button class="action-btn" style="margin-top:20px" onclick="checkSentence()">Проверить</button>
            </div>
            <div class="btn-group" id="options-container"></div>
            <button id="exit-interests-btn" onclick="setMode('interests')" style="display:none; background:none; border:none; color:var(--text-muted); margin-top:20px; font-weight:bold;">← К ВЫБОРУ ТЕМ</button>
        </div>

        <div id="interests-setup" style="display:none; width:100%;">
            <h2 style="margin-bottom:20px">Выберите интересы</h2>
            <div class="interest-item"><input type="checkbox" id="cat-auto"><label for="cat-auto" style="margin-left:10px">🏎 Автоспорт</label></div>
            <div class="interest-item"><input type="checkbox" id="cat-mma"><label for="cat-mma" style="margin-left:10px">🥊 Бои (MMA)</label></div>
            <button class="action-btn" style="margin-top:20px" onclick="saveAndStartInterests()">Начать обучение 🚀</button>
        </div>
    </div>

    <div class="container" id="stats-page">
        <div class="stat-grid">
            <div class="stat-box"><h3>Опыт</h3><p id="st-xp" class="value">0 XP</p></div>
            <div class="stat-box"><h3>Уровень</h3><p id="st-level" class="value">1</p></div>
            <div class="stat-box"><h3>Слов</h3><p id="st-words" class="value">0</p></div>
            <div class="stat-box"><h3>Фраз</h3><p id="st-phrases" class="value">0</p></div>
        </div>
        <div class="leaderboard-title">ТОП ПШЕКОВ 🏆</div>
        <div id="leaderboard-list"></div>
        <button class="action-btn" style="background:var(--error); margin-top:40px; opacity:0.3; font-size:0.7rem" onclick="resetProgress()">Сбросить прогресс</button>
    </div>

    <div id="message-screen">
        <img id="msg-cat-img" src="good.png" class="msg-cat">
        <h2 id="msg-title"></h2>
        <button class="action-btn" style="width:80%" onclick="handleMessageClick()">Продолжить</button>
    </div>

    <div class="fab-mistakes" id="fab-mistakes" onclick="openMistakes()">🔥 <span id="fab-count">0</span></div>

    <script>
        const SUPABASE_URL = 'https://lftbwacoprombmrctcaq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_6G6vug4fg8regvaZm0wnpQ_aCcjqtfs';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const tg = window.Telegram.WebApp;
        const userName = tg.initDataUnsafe?.user?.first_name || "Панама";

        const dictionary = [
            {pl:"Tak",ru:"Да"},{pl:"Nie",ru:"Нет"},{pl:"Proszę",ru:"Пожалуйста"},{pl:"Dziękuję",ru:"Спасибо"},{pl:"Przepraszam",ru:"Извините"},{pl:"Dzień dobry",ru:"Добрый день"},{pl:"Dobry wieczór",ru:"Добрый вечер"},{pl:"Dobranoc",ru:"Спокойной ночи"},{pl:"Cześć",ru:"Привет / Пока"},{pl:"Do widzenia",ru:"До свидания"},
            {pl:"Pan",ru:"Господин"},{pl:"Pani",ru:"Госпожа"},{pl:"Imię",ru:"Имя"},{pl:"Nazwisko",ru:"Фамилия"},{pl:"Człowiek",ru:"Человек"},{pl:"Kobieta",ru:"Женщина"},{pl:"Mężczyzna",ru:"Мужчина"},{pl:"Dziecko",ru:"Ребенок"},{pl:"Dom",ru:"Дом"},{pl:"Praca",ru:"Работа"},
            {pl:"Gleba", ru:"Заниженная подвеска", cat:"auto"}, {pl:"Upalać", ru:"Наваливать", cat:"auto"}, {pl:"Marchewy", ru:"Пламя из выхлопа", cat:"auto"},
            {pl:"Nokaut", ru:"Нокаут", cat:"mma"}, {pl:"Garda", ru:"Защита", cat:"mma"}, {pl:"Klincz", ru:"Клинч", cat:"mma"}
        ];

        const sentencesData = [
            {ru:"Где я могу найти свежие овощи?", pl:"Gdzie mogę znaleźć świeże warzywa?"},
            {ru:"Он сидит на хвосте", pl:"Siedzi mu na ogonie", cat:"auto"},
            {ru:"Держи защиту", pl:"Trzymaj gardę", cat:"mma"}
        ];

        let stats = JSON.parse(localStorage.getItem('pl_stats_v2')) || { xp: 0, words: 0, phrases: 0 };
        let mistakesDb = JSON.parse(localStorage.getItem('pl_mistakes_v2')) || [];
        let currentLevel = parseInt(localStorage.getItem('pl_level')) || 0;
        let currentQueue = [];
        let currentMode = 'classic';
        let isInterestMode = false;
        let selectedCats = [];
        let isWaiting = false;
        let selectedPhraseWords = [];
        let nextActionFn = null;

        tg.ready(); tg.expand();

        function switchTab(tab) {
            document.getElementById('game-container').style.display = tab === 'play' ? 'flex' : 'none';
            document.getElementById('stats-page').style.display = tab === 'stats' ? 'flex' : 'none';
            document.getElementById('tab-play').classList.toggle('active', tab === 'play');
            document.getElementById('tab-stats').classList.toggle('active', tab === 'stats');
            if (tab === 'stats') { updateStatsUI(); syncWithCloud().then(fetchLeaderboard); }
            else startLevel();
        }

        function setMode(mode) {
            if (mode === 'interests') {
                isInterestMode = false;
                document.getElementById('main-game-ui').style.display = 'none';
                document.getElementById('interests-setup').style.display = 'flex';
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('btn-interests').classList.add('active');
                return;
            }
            currentMode = mode;
            document.getElementById('interests-setup').style.display = 'none';
            document.getElementById('main-game-ui').style.display = 'flex';
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            startLevel();
        }

        function saveAndStartInterests() {
            selectedCats = [];
            if(document.getElementById('cat-auto').checked) selectedCats.push('auto');
            if(document.getElementById('cat-mma').checked) selectedCats.push('mma');
            if(selectedCats.length === 0) { alert("Выбери темы!"); return; }
            isInterestMode = true;
            document.getElementById('exit-interests-btn').style.display = 'block';
            setMode('classic');
        }

        function startLevel() {
            if (isInterestMode) {
                const pool = (currentMode === 'phrases' ? sentencesData : dictionary).filter(i => selectedCats.includes(i.cat));
                currentQueue = shuffle([...pool]);
            } else {
                document.getElementById('exit-interests-btn').style.display = 'none';
                if (currentMode === 'phrases') currentQueue = shuffle([...sentencesData]);
                else {
                    const start = currentLevel * 5;
                    currentQueue = shuffle(dictionary.slice(start, start + 5));
                    if(currentQueue.length === 0) currentQueue = shuffle(dictionary.slice(0, 5));
                }
            }
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQueue.length === 0) {
                if (isInterestMode) showMsg("Круто!", "Темы пройдены!", () => setMode('interests'), true);
                else { currentLevel++; saveStats(); showMsg("Победа!", "Уровень пройден!", startLevel, true); }
                return;
            }
            isWaiting = false;
            const cur = currentQueue[0];
            if (currentMode === 'phrases') renderPhrasesMode(cur); else renderWordsMode(cur);
            updateHeader();
        }

        function renderWordsMode(cur) {
            document.getElementById('phrase-builder-ui').style.display = 'none';
            document.getElementById('options-container').style.display = 'flex';
            document.getElementById('word').innerText = currentMode === 'audio' ? '🎧' : cur.pl;
            if(currentMode === 'audio') speakText(cur.pl, 'pl-PL');
            const container = document.getElementById('options-container'); container.innerHTML = '';
            let opts = shuffle([cur.ru, ...shuffle(dictionary).filter(x => x.ru !== cur.ru).slice(0, 2).map(x => x.ru)]);
            opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'option-btn'; b.innerText = o;
                b.onclick = () => checkWordAnswer(b, o, cur.ru, cur); container.appendChild(b);
            });
        }

        function renderPhrasesMode(cur) {
            document.getElementById('options-container').style.display = 'none';
            document.getElementById('phrase-builder-ui').style.display = 'flex';
            const slots = document.getElementById('slots-container'); const tiles = document.getElementById('tiles-container');
            slots.innerHTML = ''; tiles.innerHTML = ''; selectedPhraseWords = [];
            document.getElementById('word').innerText = cur.ru;
            const words = cur.pl.split(' ');
            shuffle(words).forEach(w => {
                const t = document.createElement('div'); t.className = 'tile'; t.innerText = w;
                t.onclick = () => { if(t.classList.contains('used')) return; t.classList.add('used'); addWordToSentence(w, t); };
                tiles.appendChild(t);
            });
        }

        function addWordToSentence(word, tileRef) {
            const slots = document.getElementById('slots-container');
            const s = document.createElement('div'); s.className = 'tile placed'; s.innerText = word;
            s.onclick = () => { s.remove(); tileRef.classList.remove('used'); selectedPhraseWords = selectedPhraseWords.filter(x => x !== word); };
            slots.appendChild(s); selectedPhraseWords.push(word);
        }

        function checkSentence() {
            const cur = currentQueue[0];
            if (selectedPhraseWords.join(' ') === cur.pl) { stats.xp += 5; stats.phrases++; saveStats(); currentQueue.shift(); nextQuestion(); }
            else alert("Неверно!");
        }

        function checkWordAnswer(btn, sel, target, curObj) {
            if (isWaiting) return; isWaiting = true;
            if (sel === target) { btn.classList.add('is-correct'); stats.xp += 1; stats.words++; saveStats(); currentQueue.shift(); setTimeout(nextQuestion, 400); }
            else { btn.classList.add('is-wrong'); mistakesDb.push(curObj); updateStatsUI(); const item = currentQueue.shift(); currentQueue.push(item); setTimeout(nextQuestion, 1000); }
        }

        function updateStatsUI() {
            document.getElementById('st-xp').innerText = stats.xp + ' XP';
            document.getElementById('st-level').innerText = currentLevel + 1;
            document.getElementById('st-words').innerText = stats.words;
            document.getElementById('st-phrases').innerText = stats.phrases;
            document.getElementById('fab-count').innerText = mistakesDb.length;
            document.getElementById('fab-mistakes').style.display = mistakesDb.length > 0 ? 'flex' : 'none';
        }

        function saveStats() { localStorage.setItem('pl_level', currentLevel); localStorage.setItem('pl_stats_v2', JSON.stringify(stats)); updateStatsUI(); syncWithCloud(); }
        async function syncWithCloud() { try { await sb.from('leaderboard').upsert({ username: userName, xp: stats.xp, phrases_count: stats.phrases, score: stats.words, level: currentLevel + 1 }, { onConflict: 'username' }); } catch (e) {} }
        async function fetchLeaderboard() { const { data } = await sb.from('leaderboard').select('*').order('xp', { ascending: false }).limit(10); document.getElementById('leaderboard-list').innerHTML = (data || []).map((u, i) => `<div class="leader-row"><span>${i+1}. ${u.username}</span><span>${u.xp || 0} XP</span></div>`).join(''); }

        function showMsg(t, d, action, isWin) { document.getElementById('main-game-ui').style.display = 'none'; const m = document.getElementById('message-screen'); m.style.display = 'flex'; document.getElementById('msg-title').innerText = t; document.getElementById('msg-cat-img').src = isWin ? 'good.png' : 'bad.png'; nextActionFn = action; }
        function handleMessageClick() { document.getElementById('message-screen').style.display = 'none'; document.getElementById('main-game-ui').style.display = 'flex'; if (nextActionFn) nextActionFn(); }
        function speakCurrent() { speakText(currentQueue[0]?.pl || "", 'pl-PL'); }
        function speakText(t, l) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = l; window.speechSynthesis.speak(u); }
        function shuffle(a) { return a.sort(() => Math.random() - 0.5); }
        function resetProgress() { if(confirm("Сбросить всё?")) { localStorage.clear(); location.reload(); } }
        function updateHeader() { document.getElementById('stats-header').innerText = isInterestMode ? "СЛЕНГ РЕЖИМ" : `УРОВЕНЬ ${currentLevel + 1}`; }

        startLevel(); updateStatsUI();
    </script>
</body>
</html>
