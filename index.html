<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panamket Pro v5</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
--bg:#0B0F19;--card:#151A27;--text:#fff;
--muted:#64748B;--accent:#3B82F6;
--ok:#10B981;--err:#FF3B30;--btn:#1E293B;
}

body{
margin:0;font-family:sans-serif;
background:var(--bg);color:var(--text);
display:flex;justify-content:center;
height:100vh;overflow:hidden;
}

.container{
width:92%;max-width:450px;
margin-top:70px;
display:flex;flex-direction:column;
}

.tabs{position:fixed;top:0;width:100%;display:flex;background:#0F172A}
.tab{flex:1;padding:15px;text-align:center;color:var(--muted);cursor:pointer}
.tab.active{color:#fff;border-bottom:3px solid var(--accent)}

.word-card{
background:var(--card);
padding:20px;border-radius:20px;
text-align:center;margin-bottom:10px;
}

button{
background:var(--btn);
border:none;padding:15px;
border-radius:12px;color:#fff;
cursor:pointer;margin:5px 0;
}

button.correct{background:var(--ok)}
button.wrong{background:var(--err)}

.action{background:var(--accent)}
</style>
</head>

<body>

<div class="tabs">
<div class="tab active" onclick="switchTab('play')">Играть</div>
<div class="tab" onclick="switchTab('stats')">Стата</div>
</div>

<div class="container" id="game">

<div class="word-card">
<h2 id="word">...</h2>
</div>

<div id="options"></div>

</div>

<div class="container" id="stats" style="display:none">
<h2>Статистика</h2>
<p id="xp"></p>
<p id="level"></p>
</div>

<script>
// ================== CONFIG ==================
const SUPABASE_URL = 'https://lftbwacoprombmrctcaq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_...';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ================== STATE ==================
const state = {
stats: JSON.parse(localStorage.getItem('stats')) || {xp:0,words:0},
level: parseInt(localStorage.getItem('level')) || 0,
lives:2,
queue:[],
deck:[],
isWaiting:false
};

// ================== DATA ==================
const dictionary = [
{pl:"Chleb",ru:"Хлеб"},
{pl:"Woda",ru:"Вода"},
{pl:"Dom",ru:"Дом"},
{pl:"Kot",ru:"Кот"}
];

// ================== UTILS ==================
function shuffle(arr){
const a=[...arr];
for(let i=a.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

function save(){
localStorage.setItem('stats',JSON.stringify(state.stats));
localStorage.setItem('level',state.level);
}

// ================== GAME ==================
function start(){
state.deck = shuffle(dictionary);
state.queue = state.deck.slice(0,5);
next();
}

function next(){
state.isWaiting=false;

if(!state.queue.length){
state.level++;
save();
alert("Уровень пройден");
start();
return;
}

render();
}

function render(){
const cur = state.queue[0];
document.getElementById('word').innerText = cur.pl;

const optsEl = document.getElementById('options');
optsEl.innerHTML="";

const options = shuffle([
cur.ru,
...shuffle(dictionary.filter(w=>w.pl!==cur.pl)).slice(0,2).map(x=>x.ru)
]);

options.forEach(o=>{
const btn=document.createElement('button');
btn.innerText=o;

btn.onclick=()=>handleAnswer(btn,o,cur);

optsEl.appendChild(btn);
});
}

function handleAnswer(btn,ans,cur){
if(state.isWaiting) return;
state.isWaiting=true;

if(ans===cur.ru){
btn.classList.add('correct');
state.stats.xp++;
state.queue.shift();
save();
setTimeout(next,400);
}else{
btn.classList.add('wrong');
state.lives--;

if(state.lives<=0){
alert("Проиграл");
state.lives=2;
start();
return;
}

state.queue.push(state.queue.shift());
setTimeout(next,600);
}
}

// ================== UI ==================
function switchTab(tab){
document.getElementById('game').style.display = tab==='play'?'flex':'none';
document.getElementById('stats').style.display = tab==='stats'?'flex':'none';

if(tab==='stats'){
document.getElementById('xp').innerText = "XP: "+state.stats.xp;
document.getElementById('level').innerText = "Level: "+(state.level+1);
}
}

// ================== INIT ==================
start();
</script>

</body>
</html>
