<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polski Trener Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0B0F19;
            --card-bg: #151A27;
            --text-main: #FFFFFF;
            --text-muted: #64748B;
            --accent: #3B82F6;
            --correct: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --btn-bg: #1E293B;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Главные табы */
        .tabs { display: flex; width: 100%; background: #0F172A; border-bottom: 1px solid #1E293B; position: fixed; top: 0; z-index: 10; }
        .tab { flex: 1; padding: 16px 0; text-align: center; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: 0.2s; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 1px; }
        .tab.active { color: var(--text-main); border-bottom: 2px solid var(--accent); }

        .container { width: 90%; max-width: 400px; text-align: center; margin-top: 80px; display: flex; flex-direction: column; justify-content: center; padding-bottom: 80px; }
        
        .mode-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .mode-btn { background: var(--btn-bg); color: var(--text-muted); border: 1px solid #1E293B; padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 10px; }
        .stats-label { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }
        .lives { color: var(--error); font-size: 1.2rem; letter-spacing: 2px; }

        /* Таймер */
        .timer-container { width: 100%; height: 6px; background: #0F172A; border-radius: 3px; overflow: hidden; margin-bottom: 20px; display: none; }
        .timer-bar { height: 100%; width: 100%; background: var(--correct); transition: width 0.1s linear; }

        /* Карточка */
        .word-card { background: var(--card-bg); padding: 40px 20px; border-radius: 20px; border: 1px solid #1E293B; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 140px; }
        .word-card h1 { margin: 0; font-size: 2.2rem; font-weight: 700; letter-spacing: -0.02em; }
        .speaker-icon { margin-top: 15px; font-size: 1.5rem; cursor: pointer; background: #1E293B; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Кнопки ответов */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button.option-btn { border: 1px solid #1E293B; padding: 18px 20px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; background: var(--btn-bg); color: #FFFFFF; transition: 0.2s; width: 100%; }
        .correct { background: rgba(16, 185, 129, 0.1) !important; border-color: var(--correct) !important; color: var(--correct) !important; }
        .wrong { background: rgba(239, 68, 68, 0.1) !important; border-color: var(--error) !important; color: var(--error) !important; animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

        /* FAB Ошибок */
        .fab-mistakes { position: fixed; bottom: 20px; right: 20px; background: #EF4444; color: #fff; padding: 14px 24px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; cursor: pointer; z-index: 50; display: none; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); border: none; }

        /* Попап Плохого кота (увеличен) */
        .cat-bad-popup { position: fixed; bottom: 85px; right: 20px; width: 165px; background: var(--card-bg); border-radius: 20px; padding: 10px; text-align: center; border: 2px solid var(--error); transform: translateY(200%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .cat-bad-popup.show { transform: translateY(0); }
        .cat-bad-popup img { width: 100%; border-radius: 12px; }

        /* Экраны и статистика */
        #message-screen, #mistakes-screen, #stats-page { display: none; flex-direction: column; align-items: center; justify-content: center; }
        #stats-page { margin-top: 100px; gap: 15px; }
        .stat-box { background: #1E293B; padding: 20px; border-radius: 16px; border: 1px solid #334155; width: 85%; text-align: left; }
        .cat-good { width: 180px; border-radius: 20px; margin-bottom: 20px; border: 3px solid var(--correct); }

        .action-btn { background: var(--accent); color: #fff; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" id="tab-play" onclick="switchTab('play')">Прогресс</div>
        <div class="tab" id="tab-stats" onclick="switchTab('stats')">Статистика</div>
    </div>

    <div class="container" id="game-container">
        <div class="mode-tabs" id="mode-tabs">
            <button class="mode-btn active" id="btn-classic" onclick="setMode('classic')">Классика</button>
            <button class="mode-btn" id="btn-sprint" onclick="setMode('sprint')">Спринт</button>
            <button class="mode-btn" id="btn-audio" onclick="setMode('audio')">Аудио</button>
        </div>

        <div class="header-info">
            <div class="stats-label" id="stats-header">УРОВЕНЬ 1 (0/20)</div>
            <div class="lives" id="lives">🤍🤍</div>
        </div>
        
        <div class="timer-container" id="timer-container">
            <div class="timer-bar" id="timer-bar"></div>
        </div>

        <div class="word-card">
            <h1 id="word" onclick="speakWord()">Dom</h1>
            <div class="speaker-icon" onclick="speakWord()">🔊</div>
        </div>

        <div class="btn-group" id="options-container"></div>
    </div>

    <div class="container" id="mistakes-screen">
        <div class="header-info" style="width:100%">
            <div class="stats-label" id="mistakes-header">ОШИБКИ (0/0)</div>
            <div class="lives">🔥</div>
        </div>
        <div class="word-card">
            <h1 id="m-word" onclick="speakMistake()">...</h1>
            <div class="speaker-icon" onclick="speakMistake()">🔊</div>
        </div>
        <div class="btn-group" id="m-options-container" style="width:100%"></div>
        <button class="action-btn" style="background:#334155" onclick="closeMistakes()">Выйти</button>
    </div>

    <div class="container" id="stats-page">
        <div class="stat-box"><h3>Текущий уровень</h3><p id="st-level" style="font-size:2rem; font-weight:bold; color:var(--accent)">1</p></div>
        <div class="stat-box"><h3>Выучено слов</h3><p id="st-words" style="font-size:2rem; font-weight:bold">0</p></div>
        <button class="action-btn" style="background:var(--error); margin-top:40px" onclick="resetProgress()">Сбросить прогресс</button>
    </div>

    <div class="container" id="message-screen">
        <img id="cat-win" src="good.png" class="cat-good" onerror="this.style.display='none'">
        <h2 id="msg-title">Заголовок</h2>
        <p id="msg-desc">Описание</p>
        <button id="msg-btn" class="action-btn" onclick="nextAction()">Продолжить</button>
    </div>

    <div class="cat-bad-popup" id="cat-bad">
        <img src="bad.png" alt="bad cat" onerror="this.style.display='none'">
    </div>

    <div class="fab-mistakes" id="fab-mistakes" onclick="openMistakes()">
        🔥 Ошибки (<span id="fab-count">0</span>)
    </div>

                return;
            }
            if (wordIndex >= levelWords.length) {
                currentLevel++;
                localStorage.setItem('polish_level', currentLevel);
                showMsg(`Уровень ${currentLevel} пройден!`, "Отличная работа!", true, "Дальше", startLevel);
                return;
            }
            isWaiting = false;
            const cur = levelWords[wordIndex];
            const askRu = currentMode === 'audio' ? false : Math.random() > 0.5;
            
            const wordEl = document.getElementById('word');
            wordEl.innerText = (currentMode === 'audio') ? '🎧' : (askRu ? cur.ru : cur.pl);
            wordEl.dataset.text = askRu ? cur.ru : cur.pl;
            wordEl.dataset.lang = askRu ? 'ru-RU' : 'pl-PL';

            if (currentMode === 'audio') speakWord();

            renderOptions('options-container', cur, askRu ? 'pl' : 'ru', (btn, opt) => {
                checkAnswer(btn, opt, cur, askRu ? 'pl' : 'ru', askRu);
            });

            if (currentMode === 'sprint') startSprint(cur, askRu ? 'pl' : 'ru');
        }

        function checkAnswer(btn, selected, cur, target, wasRu) {
            if (isWaiting) return;
            isWaiting = true;
            clearInterval(timerInterval);

            if (selected === cur[target]) {
                btn.classList.add('correct');
                if (wasRu && currentMode !== 'audio') speakText(selected, 'pl-PL');
                stats.words++;
                localStorage.setItem('polish_stats', JSON.stringify(stats));
                wordIndex++;
                setTimeout(nextWord, 800);
            } else {
                if (btn) btn.classList.add('wrong');
                showBadCat();
                if (!mistakesDb.some(m => m.pl === cur.pl)) {
                    mistakesDb.push(cur);
                    localStorage.setItem('polish_mistakes', JSON.stringify(mistakesDb));
                }
                document.querySelectorAll('#options-container .option-btn').forEach(b => {
                    if (b.innerText === cur[target]) b.classList.add('correct');
                });
                mistakesMade++;
                updateHeader();
                if (mistakesMade > maxMistakes) {
                    setTimeout(() => showMsg("Провал", "Слишком много ошибок.", true, "Заново", startLevel), 1500);
                } else {
                    wordIndex++;
                    setTimeout(nextWord, 1500);
                }
            }
            updateStatsUI();
        }

        function openMistakes() {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('mistakes-screen').style.display = 'flex';
            wordIndex = 0;
            levelWords = shuffle([...mistakesDb]);
            nextMistake();
        }

        function nextMistake() {
            if (wordIndex >= levelWords.length || mistakesDb.length === 0) {
                closeMistakes();
                return;
            }
            isWaiting = false;
            const cur = levelWords[wordIndex];
            document.getElementById('mistakes-header').innerText = `ОШИБКИ (${wordIndex + 1}/${levelWords.length})`;
            
            const wordEl = document.getElementById('m-word');
            wordEl.innerText = cur.pl;
            wordEl.dataset.text = cur.pl;

            renderOptions('m-options-container', cur, 'ru', (btn, opt) => {
                if (isWaiting) return;
                isWaiting = true;
                if (opt === cur.ru) {
                    btn.classList.add('correct');
                    mistakesDb = mistakesDb.filter(m => m.pl !== cur.pl);
                    localStorage.setItem('polish_mistakes', JSON.stringify(mistakesDb));
                    wordIndex++;
                    setTimeout(nextMistake, 800);
                } else {
                    btn.classList.add('wrong');
                    setTimeout(() => { btn.classList.remove('wrong'); isWaiting = false; }, 800);
                }
                updateStatsUI();
            });
        }

        function closeMistakes() {
            document.getElementById('mistakes-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            startLevel();
        }

        function renderOptions(id, cur, target, callback) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            let wr = shuffle(allWordsFlat.filter(w => w[target] !== cur[target])).slice(0, 2);
            let opts = shuffle([cur[target], wr[0][target], wr[1][target]]);
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = o;
                b.onclick = () => callback(b, o);
                container.appendChild(b);
            });
        }

        function startSprint(cur, target) {
            let start = Date.now();
            let bar = document.getElementById('timer-bar');
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let p = 100 - ((Date.now() - start) / 7000 * 100);
                bar.style.width = p + '%';
                bar.style.backgroundColor = p < 30 ? 'var(--error)' : (p < 60 ? 'var(--warning)' : 'var(--correct)');
                if (p <= 0) { clearInterval(timerInterval); checkAnswer(null, '', cur, target, false); }
            }, 50);
        }

        function showBadCat() {
            const c = document.getElementById('cat-bad');
            c.classList.add('show');
            setTimeout(() => c.classList.remove('show'), 2500); // Показ 2.5 секунды
        }

        function showMsg(title, desc, btn, btnT, action) {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('mistakes-screen').style.display = 'none';
            const s = document.getElementById('message-screen');
            s.style.display = 'flex';
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-desc').innerText = desc;
            document.getElementById('cat-win').style.display = title.includes('пройден') ? 'block' : 'none';
            const b = document.getElementById('msg-btn');
            b.innerText = btnT;
            window.nextAction = action;
        }

        function resetProgress() { localStorage.clear(); location.reload(); }
        function speakWord() { const el = document.getElementById('word'); speakText(el.dataset.text, el.dataset.lang); }
        function speakMistake() { speakText(document.getElementById('m-word').dataset.text, 'pl-PL'); }
        function speakText(t, l) { if (l === 'ru-RU' && currentMode !== 'audio') return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = l; u.rate = 0.9; window.speechSynthesis.speak(u); }
        function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

        startLevel();
    </script>
</body>
</html>
