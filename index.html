<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg-color: #0B0F19;
            --card-bg: #151A27;
            --text-main: #FFFFFF;
            --text-muted: #64748B;
            --accent: #3B82F6;
            --correct: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --btn-bg: #1E293B;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .tabs { display: flex; width: 100%; background: #0F172A; border-bottom: 1px solid #1E293B; position: fixed; top: 0; z-index: 10; }
        .tab { flex: 1; padding: 16px 0; text-align: center; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; }
        .tab.active { color: var(--text-main); border-bottom: 2px solid var(--accent); }

        .container { width: 92%; max-width: 450px; text-align: center; margin-top: 75px; display: flex; flex-direction: column; height: calc(100vh - 80px); padding-bottom: 20px; box-sizing: border-box; }
        
        .mode-tabs { display: flex; width: 100%; gap: 5px; margin-bottom: 15px; }
        .mode-btn { flex: 1; background: var(--btn-bg); color: var(--text-muted); border: 1px solid #1E293B; padding: 10px 2px; border-radius: 12px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .stats-label { font-size: 0.7rem; color: var(--text-muted); font-weight: bold; }
        .lives { color: var(--error); font-size: 1.1rem; }

        .word-card { background: var(--card-bg); padding: 25px 15px; border-radius: 20px; border: 1px solid #1E293B; margin-bottom: 15px; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .word-card h1 { margin: 0; font-size: 1.6rem; font-weight: 700; line-height: 1.3; }
        .speaker-icon { margin-top: 10px; font-size: 1.3rem; cursor: pointer; background: #1E293B; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Стили для конструктора фраз */
        .sentence-slots { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; min-height: 45px; margin-bottom: 20px; padding: 10px; border-bottom: 2px dashed #1E293B; }
        .tile { background: var(--btn-bg); border: 1px solid #334155; padding: 10px 14px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: 0.1s; user-select: none; }
        .tile:active { transform: scale(0.95); }
        .tile.used { opacity: 0.3; pointer-events: none; }
        .tile.placed { background: var(--accent); border-color: var(--accent); }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button.option-btn { border: 1px solid #1E293B; padding: 15px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; background: var(--btn-bg); color: #FFFFFF; width: 100%; }
        .correct { background: rgba(16, 185, 129, 0.1) !important; border-color: var(--correct) !important; color: var(--correct) !important; }
        .wrong { background: rgba(239, 68, 68, 0.1) !important; border-color: var(--error) !important; color: var(--error) !important; animation: shake 0.3s; }

        #stats-page { overflow-y: auto; display: none; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #1E293B; padding: 12px; border-radius: 15px; text-align: left; }
        .stat-box h3 { margin: 0; font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-box .value { font-size: 1.2rem; font-weight: bold; margin-top: 4px; }

        .leader-row { display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 6px; font-size: 0.85rem; }
        .leader-score { color: var(--correct); font-weight: bold; }

        .cat-bad-popup { position: fixed; bottom: 85px; right: 20px; width: 165px; background: var(--card-bg); border-radius: 20px; padding: 10px; border: 2px solid var(--error); transform: translateY(250%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; }
        .cat-bad-popup.show { transform: translateY(0); }
        .cat-bad-popup img { width: 100%; border-radius: 12px; }

        .timer-container { width: 100%; height: 5px; background: #0F172A; border-radius: 3px; overflow: hidden; margin-bottom: 15px; display: none; }
        .timer-bar { height: 100%; width: 100%; background: var(--correct); }

        @keyframes shake { 10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(3px); } }
    </style>
</head>

        let mistakesMade = 0;
        let wordIndex = 0;
        let currentMode = 'classic';
        let levelItems = [];
        let selectedPhraseWords = [];
        let isWaiting = false;

        async function syncWithCloud() {
            try {
                await sb.from('leaderboard').upsert({ 
                    username: userName, 
                    xp: stats.xp, 
                    phrases_count: stats.phrases,
                    score: stats.words, // для совместимости со старой колонкой
                    level: currentLevel + 1 
                }, { onConflict: 'username' });
            } catch (e) { console.log(e); }
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            startLevel();
        }

        function startLevel() {
            wordIndex = 0; mistakesMade = 0;
            if (currentMode === 'phrases') {
                levelItems = shuffle([...sentencesData]).slice(0, 10);
            } else {
                levelItems = shuffle([...levelsData[currentLevel]]);
            }
            document.getElementById('phrase-builder-ui').style.display = 'none';
            document.getElementById('options-container').style.display = 'flex';
            document.getElementById('message-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            nextQuestion();
        }

        function nextQuestion() {
            if (wordIndex >= levelItems.length) {
                currentLevel++;
                localStorage.setItem('pl_level', currentLevel);
                syncWithCloud();
                showMsg("Уровень пройден!", `+${currentMode === 'phrases' ? 50 : 20} XP заработано!`, startLevel);
                return;
            }
            isWaiting = false;
            const cur = levelItems[wordIndex];
            const wordEl = document.getElementById('word');
            
            if (currentMode === 'phrases') {
                renderPhrasesMode(cur);
            } else {
                renderWordsMode(cur);
            }
            updateHeader();
        }

        function renderWordsMode(cur) {
            const askRu = currentMode === 'audio' ? false : Math.random() > 0.5;
            document.getElementById('word').innerText = currentMode === 'audio' ? '🎧' : (askRu ? cur.ru : cur.pl);
            document.getElementById('word').dataset.val = (currentMode === 'audio' || !askRu) ? cur.pl : cur.ru;
            document.getElementById('word').dataset.lang = (currentMode === 'audio' || !askRu) ? 'pl-PL' : 'ru-RU';
            if (currentMode === 'audio') speakCurrent();
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            let target = askRu ? 'pl' : 'ru';
            let wr = shuffle(allWordsFlat.filter(w => w[target] !== cur[target])).slice(0, 2);
            let opts = shuffle([cur[target], wr[0][target], wr[1][target]]);
            
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = o;
                b.onclick = () => checkWordAnswer(b, o, cur[target]);
                container.appendChild(b);
            });
        }

        function renderPhrasesMode(cur) {
            document.getElementById('options-container').style.display = 'none';
            document.getElementById('phrase-builder-ui').style.display = 'block';
            const isMissingWordMode = Math.random() > 0.6; // 40% на пропуски
            selectedPhraseWords = [];
            
            const slots = document.getElementById('slots-container');
            const tiles = document.getElementById('tiles-container');
            slots.innerHTML = ''; tiles.innerHTML = '';

            const correctWords = cur.pl.replace(/[.?!,]/g, '').split(' ');
            let displayWords = [...correctWords];

            if (isMissingWordMode) {
                const idx = Math.floor(Math.random() * correctWords.length);
                const missing = correctWords[idx];
                document.getElementById('word').innerText = "Вставь пропущенное:";
                correctWords.forEach((w, i) => {
                    const s = document.createElement('div');
                    s.className = 'tile placed';
                    s.innerText = (i === idx) ? '___' : w;
                    slots.appendChild(s);
                });
                renderTiles([missing, ...shuffle(allWordsFlat).slice(0, 5).map(x => x.pl)], missing);
            } else {
                document.getElementById('word').innerText = cur.ru;
                renderTiles([...correctWords, ...shuffle(allWordsFlat).slice(0, 4).map(x => x.pl)], correctWords);
            }
        }

        function renderTiles(pool, correct) {
            const container = document.getElementById('tiles-container');
            shuffle(pool).forEach(w => {
                const t = document.createElement('div');
                t.className = 'tile';
                t.innerText = w;
                t.onclick = () => {
                    if (t.classList.contains('used')) return;
                    t.classList.add('used');
                    addWordToSentence(w, t, correct);
                };
                container.appendChild(t);
            });
        }

        function addWordToSentence(word, tileRef, correct) {
            const slots = document.getElementById('slots-container');
            const s = document.createElement('div');
            s.className = 'tile placed';
            s.innerText = word;
            s.onclick = () => {
                s.remove();
                tileRef.classList.remove('used');
                selectedPhraseWords = selectedPhraseWords.filter(x => x !== word);
            };
            slots.appendChild(s);
            selectedPhraseWords.push(word);
        }

        function checkSentence() {
            if (isWaiting) return;
            const cur = levelItems[wordIndex];
            const result = selectedPhraseWords.join(' ').toLowerCase().replace(/[.?!,]/g, '');
            const target = cur.pl.toLowerCase().replace(/[.?!,]/g, '');

            if (result === target || target.includes(result) && result.length > 3) {
                stats.xp += 5; stats.phrases++;
                saveStats();
                wordIndex++;
                setTimeout(nextQuestion, 500);
            } else {
                showBadCat();
                mistakesMade++;
                if (mistakesMade > 2) showMsg("Провал", "Попробуй еще раз!", startLevel);
            }
        }

        function checkWordAnswer(btn, sel, target) {
            if (isWaiting) return; isWaiting = true;
            if (sel === target) {
                btn.classList.add('correct');
                stats.xp += 1; stats.words++;
                saveStats();
                wordIndex++; setTimeout(nextQuestion, 600);
            } else {
                btn.classList.add('wrong');
                showBadCat();
                mistakesMade++;
                if (mistakesMade > 1) setTimeout(() => showMsg("Провал", "Слишком много ошибок", startLevel), 600);
                else { wordIndex++; setTimeout(nextQuestion, 1000); }
            }
        }

        function saveStats() {
            localStorage.setItem('pl_stats_v2', JSON.stringify(stats));
            if (stats.xp % 10 === 0) syncWithCloud();
        }

        function updateHeader() {
            document.getElementById('stats-header').innerText = `УРОВЕНЬ ${currentLevel + 1} (${wordIndex}/${levelItems.length})`;
            document.getElementById('lives').innerText = mistakesMade === 0 ? '🤍🤍' : (mistakesMade === 1 ? '🤍' : '💔');
        }

        async function switchTab(tab) {
            document.getElementById('game-container').style.display = tab === 'play' ? 'flex' : 'none';
            document.getElementById('stats-page').style.display = tab === 'stats' ? 'flex' : 'none';
            if (tab === 'stats') {
                document.getElementById('st-xp').innerText = stats.xp + ' XP';
                document.getElementById('st-words').innerText = stats.words;
                document.getElementById('st-phrases').innerText = stats.phrases;
                document.getElementById('st-level').innerText = currentLevel + 1;
                await syncWithCloud();
                fetchLeaderboard();
            }
        }

        async function fetchLeaderboard() {
            const { data } = await sb.from('leaderboard').select('*').order('xp', { ascending: false }).limit(10);
            document.getElementById('leaderboard-list').innerHTML = data.map((u, i) => `
                <div class="leader-row" style="${u.username === userName ? 'border:1px solid var(--accent)' : ''}">
                    <span>${i+1}. ${u.username}</span>
                    <span class="leader-score">${u.xp || 0} XP</span>
                </div>
            `).join('');
        }

        function showBadCat() {
            const c = document.getElementById('cat-bad');
            c.classList.add('show');
            setTimeout(() => c.classList.remove('show'), 2500);
        }

        function showMsg(t, d, action) {
            document.getElementById('game-container').style.display = 'none';
            const m = document.getElementById('message-screen');
            m.style.display = 'flex';
            document.getElementById('msg-title').innerText = t;
            document.getElementById('msg-desc').innerText = d;
            window.nextAction = action;
        }

        function speakCurrent() {
            const el = document.getElementById('word');
            const u = new SpeechSynthesisUtterance(el.dataset.val || el.innerText);
            u.lang = el.dataset.lang || 'pl-PL';
            speechSynthesis.speak(u);
        }

        function shuffle(a) { return a.sort(() => Math.random() - 0.5); }
        function resetProgress() { localStorage.clear(); location.reload(); }

        startLevel();
    </script>
</body>
</html>
