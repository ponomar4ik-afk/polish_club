<html lang="pl">
<head>

    <style>

            --bg-color: #0B0F19; --card-bg: #151A27; --text-main: #FFFFFF;

            --error: #FF3B30; --btn-bg: #1E293B;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
            -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation;
        }

        .tabs { display: flex; width: 100%; background: #0F172A; border-bottom: 1px solid #1E293B; position: fixed; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 18px 0; text-align: center; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; text-transform: uppercase; transition: 0.2s;}
        .tab.active { color: var(--text-main); border-bottom: 3px solid var(--accent); }

        .container { 
            width: 92%; max-width: 450px; text-align: center; margin-top: 80px; 
            display: flex; flex-direction: column; height: calc(100vh - 100px); 
            box-sizing: border-box; padding-bottom: 80px;
        }
        
        .mode-tabs { display: flex; width: 100%; gap: 6px; margin-bottom: 15px; flex-shrink: 0; }
        .mode-btn { flex: 1; background: var(--btn-bg); color: var(--text-muted); border: 1px solid #1E293B; padding: 12px 2px; border-radius: 12px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s;}
        .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .is-pressed { box-shadow: inset 0 0 0 3px #FFFFFF !important; transform: scale(0.96); transition: 0.1s; }
        .is-correct { border-color: var(--correct) !important; background: rgba(16, 185, 129, 0.2) !important; color: var(--correct) !important; }
        .is-wrong { border-color: var(--error) !important; background: rgba(255, 59, 48, 0.2) !important; color: var(--error) !important; animation: shake 0.3s; }

        .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-shrink: 0; }
        .stats-label { font-size: 0.7rem; color: var(--text-muted); font-weight: bold; }
        .lives { color: var(--error); font-size: 1.1rem; }

        .word-card { background: var(--card-bg); padding: 25px 20px; border-radius: 24px; border: 1px solid #1E293B; margin-bottom: 15px; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        .word-card h1 { margin: 0; font-size: 1.7rem; font-weight: 700; text-align: center;}
        .speaker-icon { margin-top: 10px; font-size: 1.2rem; cursor: pointer; background: #1E293B; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        #interests-panel { display: none; flex-direction: column; width: 100%; }
        .interest-item { display: flex; align-items: center; background: var(--card-bg); padding: 15px; border-radius: 18px; margin-bottom: 10px; border: 1px solid #1E293B; width: 100%; box-sizing: border-box; }
        .interest-item input { width: 22px; height: 22px; margin-right: 15px; accent-color: var(--accent); }

        .sentence-slots { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; min-height: 45px; margin-bottom: 15px; padding: 10px; border-bottom: 1px dashed #1E293B; }
        .tile { background: var(--btn-bg); border: 1px solid #334155; padding: 10px 14px; border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        .tile.used { opacity: 0.15; pointer-events: none; }
        .tile.placed { background: var(--accent); border-color: var(--accent); color: white; }
        .tile.placeholder { background: transparent !important; border: 2px dashed rgba(255,255,255,0.15) !important; min-width: 60px; color: transparent; pointer-events: none; }

        .correct-hint-box { display: none; margin-bottom: 10px; padding: 12px; background: rgba(16, 185, 129, 0.15); border: 1px solid var(--correct); border-radius: 12px; color: var(--correct); font-weight: 700; font-size: 0.9rem; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        button.option-btn { border: 1px solid #1E293B; padding: 18px; border-radius: 15px; font-size: 1.05rem; font-weight: 600; cursor: pointer; background: var(--btn-bg); color: #FFFFFF; width: 100%; transition: 0.1s; }
        .action-btn { background: var(--accent); color: #fff; border: none; padding: 22px 30px; border-radius: 18px; font-weight: 800; font-size: 1.1rem; cursor: pointer; width: 100%; }

        .fab-mistakes { position: fixed; bottom: 20px; right: 20px; background: var(--error); color: #fff; padding: 14px 22px; border-radius: 30px; font-weight: 800; font-size: 0.85rem; cursor: pointer; z-index: 2000; display: none; align-items: center; gap: 8px; box-shadow: 0 8px 20px rgba(255, 59, 48, 0.4); border: none; }

        #stats-page { overflow-y: auto; display: none; text-align: left; }

    </style>
</head>
<body>

    <div class="tabs">

            </div>

            <div class="btn-group" id="options-container"></div>
        </div>

        <div id="interests-panel">

                <div class="interest-item"><input type="checkbox" id="cat-football"><label style="margin-left:10px" for="cat-football">⚽️ Футбол</label></div>
            </div>

        </div>
    </div>

            {pl: "Czy ten produkt to limitowana edycja?", ru: "Этот товар — лимитированная серия?", cat: "buyer"},
            {pl: "Mogę prosić o odłożenie tej marynarki do końca dnia?", ru: "Могу я попросить отложить этот пиджак до конца дня?", cat: "buyer"},
            {pl: "Szukam prezentu dla bardzo wymagającego klienta", ru: "Я ищу подарок для очень требовательного клиента", cat: "buyer"},

            // БАЙЕР: Качество, Материалы и Подлинность
            {pl: "Szwy są idealnie równe, to na pewno oryginał", ru: "Швы идеально ровные, это точно оригинал", cat: "buyer"},
            {pl: "Ten kolor na zdjęciu wygląda inaczej niż w rzeczywistości", ru: "Этот цвет на фото выглядит иначе, чем в реальности", cat: "buyer"},
            {pl: "Pudełko jest lekko uszkodzone, czy mają Państwo inne?", ru: "Коробка слегка повреждена, у вас есть другая?", cat: "buyer"},

            // БАЙЕР: Оплата, Скидки и Документы
            {pl: "Muszę doliczyć koszty ubezpieczenia przesyłki międzynarodowej", ru: "Я должен добавить стоимость страховки международной посылки", cat: "buyer"},
            {pl: "Klient prosi o przesłanie skanu paragonu przed wysyłką", ru: "Клиент просит прислать скан чека перед отправкой", cat: "buyer"},
            {pl: "Płatność została odrzucona, spróbuję inną kartą", ru: "Платеж отклонен, попробую другую карту", cat: "buyer"},

            // БАЙЕР: Доставка и Сервис
            {pl: "Paczka zostanie wysłana kurierem ekspresowym jutro rano", ru: "Посылка будет отправлена экспресс-курьером завтра утром", cat: "buyer"},
            {pl: "Prześlę numer śledzenia przesyłki zaraz po nadaniu", ru: "Я пришлю номер отслеживания сразу после отправки", cat: "buyer"},
            {pl: "Produkt zostanie zapakowany w papier prezentowy и wstążkę", ru: "Товар будет упакован в подарочную бумагу и ленту", cat: "buyer"},

            // БАЙЕР: Тренды и Обсуждение
            {pl: "Szukam czegoś unikatowego, czego nie ma w sieciówkach", ru: "Я ищу что-то уникальное, чего нет в масс-маркете", cat: "buyer"},
            {pl: "Kolekcja kapsułowa wyprzedała się w kilka minut", ru: "Капсульная коллекция распродалась за несколько минут", cat: "buyer"},
            {pl: "To jest wyrafinowany styl dla prawdziwych koneserów", ru: "Это изысканный стиль для настоящих ценителей", cat: "buyer"}
        ];

        // --- СОСТОЯНИЕ И ЛОГИКА ---
        let stats = JSON.parse(localStorage.getItem('pl_stats_v2')) || { xp: 0, words: 0, phrases: 0 };
        let mistakesDb = JSON.parse(localStorage.getItem('pl_mistakes_v2')) || [];
        let currentLevel = parseInt(localStorage.getItem('pl_level')) || 0;
        let selectedCats = JSON.parse(localStorage.getItem('pl_selected_cats')) || [];
        
        let levelLives = 2; 
        let activeDeck = [];      // Сюда грузим СЛОВА
        let activePhrases = [];   // Сюда грузим ФРАЗЫ (Фикс 1)
        let currentQueue = [];
        let currentMode = 'classic';
        let isWaiting = false;
        let selectedPhraseWords = [];
        let nextActionFn = null;

        tg.ready(); tg.expand();

        function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }

        function renderLives() {
            document.getElementById('lives-display').innerText = "❤️".repeat(levelLives) + "🤍".repeat(Math.max(0, 2 - levelLives));
        }

        // --- МИКСЕР ДАННЫХ ---
        function applyMixer() {
            try {
                selectedCats = [];
                ['auto', 'football', 'mma', 'truck', 'buyer'].forEach(cat => {
                    if(document.getElementById('cat-' + cat)?.checked) selectedCats.push(cat);
                });
                localStorage.setItem('pl_selected_cats', JSON.stringify(selectedCats));
                
                // Фильтруем СЛОВА
                const baseWords = dictionary.filter(w => w.cat === 'base');
                const interestWords = dictionary.filter(w => selectedCats.includes(w.cat));
                activeDeck = selectedCats.length === 0 ? shuffle(baseWords) : shuffle([...shuffle(baseWords).slice(0, 500), ...interestWords]);
                
                // Фильтруем ФРАЗЫ (Решение проблемы "Слова во фразах")
                const basePhrases = sentencesData.filter(s => s.cat === 'base');
                const interestPhrases = sentencesData.filter(s => selectedCats.includes(s.cat));
                activePhrases = selectedCats.length === 0 ? shuffle(basePhrases) : shuffle([...shuffle(basePhrases).slice(0, 50), ...interestPhrases]);
                
                setMode('classic');
            } catch (e) {
                console.error("Ошибка в applyMixer:", e);
            }
        }

        function startLevel() {
            levelLives = 2; 
            renderLives();
            const isExam = (currentLevel + 1) % 10 === 0;
            
            // Выбираем правильный источник данных (Фикс 1)
            let sourceArray = currentMode === 'phrases' ? activePhrases : activeDeck;
            if (!sourceArray || sourceArray.length === 0) sourceArray = activeDeck; // подстраховка
            
            if (isExam) {
                currentQueue = shuffle([...sourceArray]).slice(0, 20);
            } else {
                currentQueue = shuffle([...sourceArray]).slice(0, 10);
            }
            
            if(currentQueue.length === 0) currentQueue = shuffle([...activeDeck]).slice(0, 10);
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQueue.length === 0) {
                currentLevel++; saveStats();
                showMsg("Победа!", "Уровень пройден!", startLevel, true);
                return;
            }
            isWaiting = false;
            document.getElementById('correct-hint').style.display = 'none';
            const cur = currentQueue[0];
            
            if (currentMode === 'phrases') renderPhrasesMode(cur); 
            else renderWordsMode(cur);
            
            updateHeader();
        }

        function renderWordsMode(cur) {
            document.getElementById('phrase-builder-ui').style.display = 'none';
            document.getElementById('options-container').style.display = 'flex';
            document.getElementById('word').innerText = currentMode === 'audio' ? '🎧' : cur.pl;
            speakText(cur.pl);
            
            const container = document.getElementById('options-container'); 
            container.innerHTML = '';
            
            let pool = dictionary.filter(w => w.ru !== cur.ru).map(w => w.ru);
            let distractors = shuffle(pool).slice(0, 2);
            let opts = shuffle([cur.ru, ...distractors]);
            
            opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'option-btn'; b.innerText = o;
                b.onclick = () => { if(isWaiting) return; checkWordAnswer(b, o, cur.ru, cur); };
                container.appendChild(b);
            });
        }

        function renderPhrasesMode(cur) {
            document.getElementById('options-container').style.display = 'none';
            document.getElementById('phrase-builder-ui').style.display = 'flex';
            const slots = document.getElementById('slots-container'); 
            const tiles = document.getElementById('tiles-container');
            slots.innerHTML = ''; tiles.innerHTML = ''; selectedPhraseWords = [];
            
            document.getElementById('word').innerText = cur.ru;
            const correctWords = cur.pl.split(' ');
            
            // Ложные варианты из слов, чтобы запутать (это правильно)
            const traps = shuffle(dictionary).slice(0, 4).map(x => x.pl);
            const pool = shuffle([...correctWords, ...traps]);
            
            pool.forEach(w => {
                const t = document.createElement('div'); t.className = 'tile'; t.innerText = w;
                t.onclick = () => {
                    if(t.classList.contains('used')) return;
                    t.classList.add('used'); speakText(w);
                    const s = document.createElement('div'); s.className = 'tile placed'; s.innerText = w;
                    s.onclick = () => { s.remove(); t.classList.remove('used'); selectedPhraseWords = selectedPhraseWords.filter(x => x !== w); };
                    slots.appendChild(s); selectedPhraseWords.push(w);
                };
                tiles.appendChild(t);
            });
        }

        function handleMistake(curObj) {
            levelLives--;
            renderLives();
            addMistake(curObj);
            
            if (levelLives <= 0) {
                isWaiting = true;
                setTimeout(() => {
                    showMsg("Ой-ой!", "Жизни кончились. Давай сначала?", startLevel, false);
                }, 600);
            } else {
                currentQueue.push(currentQueue.shift());
                setTimeout(nextQuestion, 1200);
            }
        }

        function checkSentence() {
            const cur = currentQueue[0];
            if (selectedPhraseWords.join(' ') === cur.pl) {
                stats.xp += 5; stats.phrases++; currentQueue.shift(); saveStats(); setTimeout(nextQuestion, 400);
            } else {
                const hint = document.getElementById('correct-hint');
                hint.innerText = "Правильно: " + cur.pl; hint.style.display = 'block';
                handleMistake(cur);
            }
        }

        function checkWordAnswer(btn, sel, target, curObj) {
            isWaiting = true;
            if (sel === target) {
                btn.classList.add('is-correct'); stats.xp += 1; stats.words++; currentQueue.shift();
                saveStats(); setTimeout(nextQuestion, 400);
            } else {
                btn.classList.add('is-wrong');
                handleMistake(curObj);
            }
        }

        // --- СИСТЕМНЫЕ ФУНКЦИИ ---
        function setMode(mode) {
            document.getElementById('interests-panel').style.display = mode === 'interests' ? 'flex' : 'none';
            document.getElementById('play-zone').style.display = mode === 'interests' ? 'none' : 'flex';
            
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-' + (mode === 'interests' ? 'interests' : mode));
            if(btn) btn.classList.add('active');
            
            if (mode !== 'interests') { currentMode = mode; startLevel(); }
        }

        function switchTab(tab) {
            document.getElementById('game-container').style.display = tab === 'play' ? 'flex' : 'none';
            document.getElementById('stats-page').style.display = tab === 'stats' ? 'flex' : 'none';
            
            // Фикс 2: Подсветка кнопок вкладок
            document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
            const activeTabBtn = document.getElementById('tab-' + tab);
            if(activeTabBtn) activeTabBtn.classList.add('active');

            if (tab === 'stats') { updateStatsUI(); syncWithCloud().then(fetchLeaderboard); }
            else { setMode('classic'); }
        }

        function addMistake(item) {
            if (!mistakesDb.some(m => m.pl === item.pl)) { mistakesDb.push(item); updateStatsUI(); }
        }

        function openMistakes() {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('mistakes-screen').style.display = 'flex';
            currentQueue = shuffle([...mistakesDb]); 
            renderMistakeQuestion();
        }

        function renderMistakeQuestion() {
            if (currentQueue.length === 0) { closeMistakes(); return; }
            const cur = currentQueue[0];
            document.getElementById('m-word').innerText = cur.pl;
            const container = document.getElementById('m-options-container'); 
            container.innerHTML = '';
            
            // Фикс 3: Реальные слова вместо "Ошибка 1"
            let pool = dictionary.filter(w => w.ru !== cur.ru).map(w => w.ru);
            let opts = shuffle([cur.ru, ...shuffle(pool).slice(0, 2)]);
            
            opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'option-btn'; b.innerText = o;
                b.onclick = () => { 
                    if(o === cur.ru) { 
                        mistakesDb = mistakesDb.filter(m => m.pl !== cur.pl); 
                        currentQueue.shift(); 
                        renderMistakeQuestion(); 
                    } else {
                        b.classList.add('is-wrong'); // Визуально пометим ошибку
                    }
                };
                container.appendChild(b);
            });
            updateStatsUI();
        }

        function closeMistakes() { 
            document.getElementById('mistakes-screen').style.display = 'none'; 
            document.getElementById('game-container').style.display = 'flex'; 
            updateStatsUI(); 
        }
        
        function saveStats() { 
            localStorage.setItem('pl_level', currentLevel); 
            localStorage.setItem('pl_stats_v2', JSON.stringify(stats)); 
            localStorage.setItem('pl_mistakes_v2', JSON.stringify(mistakesDb)); 
            updateStatsUI(); 
            syncWithCloud(); 
        }
        
        function updateStatsUI() {
            document.getElementById('st-xp').innerText = stats.xp + ' XP';
            document.getElementById('st-level').innerText = currentLevel + 1;
            document.getElementById('st-words').innerText = stats.words;
            document.getElementById('st-phrases').innerText = stats.phrases;
            document.getElementById('fab-count').innerText = mistakesDb.length;
            document.getElementById('fab-mistakes').style.display = mistakesDb.length > 0 ? 'flex' : 'none';
        }
        
        function updateHeader() { const isExam = (currentLevel + 1) % 10 === 0; document.getElementById('stats-header').innerText = isExam ? "ЭКЗАМЕН" : `УРОВЕНЬ ${currentLevel + 1}`; }
        function speakCurrent() { speakText(currentQueue[0]?.pl || ""); }
        function speakMistake() { speakText(document.getElementById('m-word').innerText); }
        function speakText(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'pl-PL'; window.speechSynthesis.speak(u); }
        function resetProgress() { if(confirm("Сбросить всё?")) { localStorage.clear(); location.reload(); } }
        
        async function syncWithCloud() { try { await sb.from('leaderboard').upsert({ username: userName, xp: stats.xp, score: stats.words, level: currentLevel + 1 }, { onConflict: 'username' }); } catch (e) {} }
        async function fetchLeaderboard() { const { data } = await sb.from('leaderboard').select('*').order('xp', { ascending: false }).limit(10); document.getElementById('leaderboard-list').innerHTML = (data || []).map((u, i) => `<div class="leader-row"><span>${i+1}. ${u.username}</span><span>${u.xp} XP</span></div>`).join(''); }
        
        function showMsg(t, d, action, isWin) { 
            document.getElementById('play-zone').style.display = 'none'; 
            const m = document.getElementById('message-screen'); 
            m.style.display = 'flex'; 
            document.getElementById('msg-title').innerText = t; 
            document.getElementById('msg-cat-img').src = isWin ? 'good.png' : 'bad.png'; 
            nextActionFn = action; 
        }
        
        function handleMessageClick() { 
            document.getElementById('message-screen').style.display = 'none'; 
            document.getElementById('play-zone').style.display = 'flex'; 
            if (nextActionFn) nextActionFn(); 
        }

        // --- ИНИЦИАЛИЗАЦИЯ ---
        applyMixer(); updateStatsUI();
    </script>
</body>
</html>
