<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panamket Pro v3.9</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0B0F19; --card-bg: #151A27; --text-main: #FFFFFF;
            --text-muted: #64748B; --accent: #3B82F6; --correct: #10B981;
            --error: #FF3B30; --btn-bg: #1E293B;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        .tabs { display: flex; width: 100%; background: #0F172A; border-bottom: 1px solid #1E293B; position: fixed; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 18px 0; text-align: center; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab.active { color: var(--text-main); border-bottom: 3px solid var(--accent); }

        .container { width: 92%; max-width: 450px; text-align: center; margin-top: 80px; display: flex; flex-direction: column; height: calc(100vh - 80px); box-sizing: border-box; padding-bottom: 40px; }
        .mode-tabs { display: flex; width: 100%; gap: 6px; margin-bottom: 15px; }
        .mode-btn { flex: 1; background: var(--btn-bg); color: var(--text-muted); border: 1px solid #1E293B; padding: 12px 2px; border-radius: 12px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .word-card { background: var(--card-bg); padding: 25px; border-radius: 24px; border: 1px solid #1E293B; margin-bottom: 15px; }
        .word-card h1 { margin: 0; font-size: 1.7rem; }
        
        .interest-item { display: flex; align-items: center; background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #1E293B; width: 100%; box-sizing: border-box; }
        .interest-item input { width: 22px; height: 22px; margin-right: 15px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .option-btn { border: 1px solid #1E293B; padding: 18px; border-radius: 15px; font-size: 1rem; font-weight: 600; background: var(--btn-bg); color: #FFF; }
        .is-correct { border-color: var(--correct)!important; background: rgba(16,185,129,0.2)!important; }
        .is-wrong { border-color: var(--error)!important; background: rgba(255,59,48,0.2)!important; }
        
        .action-btn { background: var(--accent); color: #fff; border: none; padding: 20px; border-radius: 18px; font-weight: 800; font-size: 1.1rem; width: 100%; margin-top: 10px; }
        
        #message-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: fixed; top:0; left:0; width:100%; background: var(--bg-color); z-index: 1000; }
        @keyframes shake { 10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(3px); } }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="location.reload()">Прогресс</div>
        <div class="tab" style="opacity: 0.5">Статистика</div>
    </div>

    <div class="container" id="game-container">
        <div class="mode-tabs">
            <button class="mode-btn active" id="btn-classic" onclick="setMode('classic')">Слова</button>
            <button class="mode-btn" id="btn-phrases" onclick="setMode('phrases')">Фразы</button>
            <button class="mode-btn" id="btn-audio" onclick="setMode('audio')">Аудио</button>
            <button class="mode-btn" style="background: rgba(59, 130, 246, 0.2);" id="btn-interests" onclick="setMode('interests')">🎯 Темы</button>
        </div>

        <div id="main-game-ui">
            <div style="display:flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.7rem; color: var(--text-muted);">
                <div id="stats-header">ЗАГРУЗКА...</div>
                <div>🤍🤍</div>
            </div>
            <div class="word-card">
                <h1 id="word">...</h1>
                <div onclick="speakCurrent()" style="margin-top:15px; cursor:pointer; background:#1E293B; width:40px; height:40px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;">🔊</div>
            </div>
            <div class="btn-group" id="options-container"></div>
            <button id="exit-interests-btn" onclick="setMode('interests')" style="display:none; background:none; border:none; color:var(--text-muted); margin-top:20px; font-weight:bold;">← К ВЫБОРУ ТЕМ</button>
        </div>

        <div id="interests-setup" style="display:none; flex-direction:column; width:100%;">
            <h2 style="font-size:1.1rem">Выбери темы сленга:</h2>
            <div class="interest-item"><input type="checkbox" id="cat-auto"><label for="cat-auto">🏎 Автоспорт (100 слов)</label></div>
            <div class="interest-item"><input type="checkbox" id="cat-mma"><label for="cat-mma">🥊 Бои (MMA)</label></div>
            <button class="action-btn" onclick="saveAndStartInterests()">Начать обучение 🚀</button>
        </div>
    </div>

    <div id="message-screen">
        <h2 id="msg-title">Победа!</h2>
        <button class="action-btn" style="width:80%" onclick="location.reload()">Дальше</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const dictionary = [
            {pl:"Tak",ru:"Да"},{pl:"Nie",ru:"Нет"},{pl:"Dziękuję",ru:"Спасибо"},
            {pl:"Gleba", ru:"Заниженная подвеска", cat:"auto"}, {pl:"Upalać", ru:"Наваливать", cat:"auto"}, {pl:"Marchewy", ru:"Пламя из выхлопа", cat:"auto"},
            {pl:"Nokaut", ru:"Нокаут", cat:"mma"}, {pl:"Garda", ru:"Защита", cat:"mma"}
        ];

        let currentQueue = [];
        let currentMode = 'classic';
        let isInterestMode = false;
        let selectedCats = [];
        let isWaiting = false;

        function setMode(mode) {
            if (mode === 'interests') {
                document.getElementById('main-game-ui').style.display = 'none';
                document.getElementById('interests-setup').style.display = 'flex';
                return;
            }
            currentMode = mode;
            document.getElementById('interests-setup').style.display = 'none';
            document.getElementById('main-game-ui').style.display = 'block';
            startLevel();
        }

        function saveAndStartInterests() {
            selectedCats = [];
            if(document.getElementById('cat-auto').checked) selectedCats.push('auto');
            if(document.getElementById('cat-mma').checked) selectedCats.push('mma');
            if(selectedCats.length === 0) { alert("Выбери тему!"); return; }
            isInterestMode = true;
            document.getElementById('exit-interests-btn').style.display = 'block';
            setMode('classic');
        }

        function startLevel() {
            let pool = isInterestMode ? dictionary.filter(i => selectedCats.includes(i.cat)) : dictionary.slice(0, 5);
            currentQueue = pool.sort(() => Math.random() - 0.5);
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQueue.length === 0) {
                document.getElementById('main-game-ui').style.display = 'none';
                document.getElementById('message-screen').style.display = 'flex';
                return;
            }
            isWaiting = false;
            const cur = currentQueue[0];
            document.getElementById('word').innerText = cur.pl;
            document.getElementById('stats-header').innerText = isInterestMode ? "СЛЕНГ РЕЖИМ" : "УРОВЕНЬ 1";
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            let opts = [cur.ru, "Ошибка 1", "Ошибка 2"].sort(() => Math.random() - 0.5);
            
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = o;
                b.onclick = () => {
                    if(isWaiting) return; isWaiting = true;
                    if(o === cur.ru) { b.classList.add('is-correct'); currentQueue.shift(); setTimeout(nextQuestion, 500); }
                    else { b.classList.add('is-wrong'); setTimeout(() => { b.classList.remove('is-wrong'); isWaiting = false; }, 800); }
                };
                container.appendChild(b);
            });
        }

        function speakCurrent() {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(document.getElementById('word').innerText);
            u.lang = 'pl-PL';
            window.speechSynthesis.speak(u);
        }

        // Запуск
        setMode('classic');
    </script>
</body>
</html>
