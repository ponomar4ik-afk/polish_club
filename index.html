<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polski Trener</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0B0F19;
            --card-bg: #151A27;
            --text-main: #FFFFFF;
            --text-muted: #64748B;
            --accent: #3B82F6;
            --correct: #10B981;
            --error: #EF4444;
            --btn-bg: #1E293B;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            width: 100%;
            background: #0F172A;
            border-bottom: 1px solid #1E293B;
            margin-bottom: 40px;
        }

        .tab {
            flex: 1;
            padding: 16px 0;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s, border-bottom 0.2s;
            border-bottom: 2px solid transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab.active {
            color: var(--text-main);
            border-bottom: 2px solid var(--accent);
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .stats {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* Карточка слова */
        .word-card {
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 20px;
            border: 1px solid #1E293B;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .word-card h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            cursor: pointer; /* Показываем, что слово кликабельно */
        }

        /* Иконка озвучки */
        .speaker-icon {
            margin-top: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s, transform 0.1s;
            background: #1E293B;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .speaker-icon:active {
            transform: scale(0.9);
            opacity: 1;
        }

        /* Кнопки ответов */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button.option-btn {
            border: 1px solid #1E293B;
            padding: 18px 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--btn-bg);
            color: #FFFFFF;
            transition: transform 0.1s ease, background 0.2s, border-color 0.2s;
            width: 100%;
        }

        button.option-btn:active {
            transform: scale(0.96);
        }

        .correct { 
            background: rgba(16, 185, 129, 0.1) !important;
            border-color: var(--correct) !important;
            color: var(--correct) !important;
        }
        .wrong { 
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: var(--error) !important;
            color: var(--error) !important;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" id="tab-ru" onclick="setMode('ru')">Русские слова</div>
        <div class="tab" id="tab-pl" onclick="setMode('pl')">Польские слова</div>
    </div>

    <div class="container">
        <div class="stats" id="stats">WYNIK: 0 / 0</div>
        
        <div class="word-card" id="card">
            <h1 id="word" onclick="speakWord()">Dom</h1>
            <div class="speaker-icon" onclick="speakWord()">🔊</div>
        </div>

        <div class="btn-group" id="options-container">
            </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Наш словарь
        const dictionary = [
            { pl: "Słońce", ru: "Солнце" },
            { pl: "Kobieta", ru: "Женщина" },
            { pl: "Mężczyzna", ru: "Мужчина" },
            { pl: "Okno", ru: "Окно" },
            { pl: "Noc", ru: "Ночь" },
            { pl: "Dzień", ru: "День" },
            { pl: "Naczynie", ru: "Посуда" },
            { pl: "Rzecz", ru: "Вещь" },
            { pl: "Samochód", ru: "Машина" },
            { pl: "Książka", ru: "Книга" },
            { pl: "Dziecko", ru: "Ребенок" },
            { pl: "Miłość", ru: "Любовь" },
            { pl: "Dom", ru: "Дом" },
            { pl: "Drzewo", ru: "Дерево" },
            { pl: "Woda", ru: "Вода" }
        ];

        let mode = 'ru'; // 'ru' - главное слово русское, 'pl' - главное слово польское
        let currentWord = {};
        let score = 0;
        let total = 0;
        let isWaiting = false; // Блокировка нажатий после ответа

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('tab-ru').className = mode === 'ru' ? 'tab active' : 'tab';
            document.getElementById('tab-pl').className = mode === 'pl' ? 'tab active' : 'tab';
            nextWord();
        }

        // Функция перемешивания массива
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function nextWord() {
            isWaiting = false;
            
            // Выбираем правильное слово
            currentWord = dictionary[Math.floor(Math.random() * dictionary.length)];
            
            // Настраиваем отображение в зависимости от режима
            const mainWord = mode === 'ru' ? currentWord.ru : currentWord.pl;
            const targetKey = mode === 'ru' ? 'pl' : 'ru'; // То, что должно быть на кнопках
            
            document.getElementById('word').innerText = mainWord;

            // Генерируем 3 варианта ответа (1 правильный, 2 случайных неправильных)
            let wrongOptions = dictionary.filter(w => w[targetKey] !== currentWord[targetKey]);
            wrongOptions = shuffle(wrongOptions).slice(0, 2);
            
            let allOptions = [
                currentWord[targetKey], 
                wrongOptions[0][targetKey], 
                wrongOptions[1][targetKey]
            ];
            allOptions = shuffle(allOptions);

            // Отрисовываем кнопки
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            allOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, currentWord[targetKey]);
                container.appendChild(btn);
            });
        }

        function checkAnswer(btnElement, selectedOption, correctOption) {
            if (isWaiting) return;
            isWaiting = true;
            total++;

            // Если выбрали режим "Русские слова", то по клику на правильный польский ответ
            // логично его озвучить для закрепления.
            if (mode === 'ru' && selectedOption === correctOption) {
                speakText(selectedOption, 'pl-PL');
            }

            if (selectedOption === correctOption) {
                score++;
                btnElement.classList.add('correct');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                btnElement.classList.add('wrong');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                
                // Подсвечиваем правильный ответ
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(b => {
                    if (b.innerText === correctOption) b.classList.add('correct');
                });
            }

            document.getElementById('stats').innerText = `WYNIK: ${score} / ${total}`;
            setTimeout(nextWord, 1000);
        }

        // Озвучка главного слова на карточке
        function speakWord() {
            const textToSpeak = mode === 'ru' ? currentWord.ru : currentWord.pl;
            const lang = mode === 'ru' ? 'ru-RU' : 'pl-PL';
            speakText(textToSpeak, lang);
        }

        // Универсальная функция озвучки
        function speakText(text, lang) {
            // Прерываем предыдущую озвучку, если она еще идет
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            
            // Настройка голоса (можно поэкспериментировать, но дефолтные обычно норм)
            utterance.rate = 0.9; // Чуть медленнее для лучшего понимания
            utterance.pitch = 1.0;
            
            window.speechSynthesis.speak(utterance);
        }

        // Запуск
        nextWord();
    </script>
</body>
</html>
