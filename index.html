<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polski Trener Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0B0F19;
            --card-bg: #151A27;
            --text-main: #FFFFFF;
            --text-muted: #64748B;
            --accent: #3B82F6;
            --correct: #10B981;
            --error: #EF4444;
            --btn-bg: #1E293B;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 15, 25, 0.85);
            z-index: -1;
        }

        .tabs { display: flex; width: 100%; background: #0F172A; border-bottom: 1px solid #1E293B; position: fixed; top: 0; z-index: 10; }
        .tab { flex: 1; padding: 16px 0; text-align: center; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: 0.2s; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 1px; }
        .tab.active { color: var(--text-main); border-bottom: 2px solid var(--accent); }

        .container { width: 90%; max-width: 400px; text-align: center; margin-top: 80px; display: flex; flex-direction: column; justify-content: center; }
        .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 10px; }
        .stats { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }
        .lives { color: var(--error); font-size: 1.2rem; letter-spacing: 2px; }

        .word-card { background: var(--card-bg); padding: 40px 20px; border-radius: 20px; border: 1px solid #1E293B; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .word-card h1 { margin: 0; font-size: 2.2rem; font-weight: 700; letter-spacing: -0.02em; cursor: pointer; }

        .speaker-icon { margin-top: 15px; font-size: 1.5rem; cursor: pointer; opacity: 0.6; transition: 0.2s; background: #1E293B; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .speaker-icon:active { transform: scale(0.9); opacity: 1; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button.option-btn { border: 1px solid #1E293B; padding: 18px 20px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; background: var(--btn-bg); color: #FFFFFF; transition: transform 0.1s ease, background 0.2s, border-color 0.2s; width: 100%; }
        button.option-btn:active { transform: scale(0.96); }

        .correct { background: rgba(16, 185, 129, 0.1) !important; border-color: var(--correct) !important; color: var(--correct) !important; }
        .wrong { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; background: rgba(239, 68, 68, 0.1) !important; border-color: var(--error) !important; color: var(--error) !important; }

        .cat-bad-popup {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 110px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 2px solid var(--error);
            transform: translateY(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }
        .cat-bad-popup.show { transform: translateY(0); }
        .cat-bad-popup img { width: 100%; border-radius: 10px; }
        .cat-bad-popup p { margin: 8px 0 0; font-size: 0.9rem; font-weight: bold; color: var(--error); }

        #message-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 60vh; }
        #msg-image { width: 160px; height: 160px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; display: none; border: 3px solid var(--correct); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2); }
        #message-screen h2 { font-size: 2rem; margin-bottom: 10px; }
        #message-screen p { color: var(--text-muted); margin-bottom: 30px; text-align: center; }
        .action-btn { background: var(--accent); color: #fff; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" id="tab-play" onclick="switchTab('play')">Прогресс</div>
        <div class="tab" id="tab-mistakes" onclick="switchTab('mistakes')">Ошибки</div>
    </div>

    <div class="container" id="game-container">
        <div class="header-info">
            <div class="stats" id="stats">УРОВЕНЬ 1 (0/20)</div>
            <div class="lives" id="lives">🤍🤍</div>
        </div>
        
        <div class="word-card" id="card">
            <h1 id="word" onclick="speakWord()">Dom</h1>
            <div class="speaker-icon" onclick="speakWord()">🔊</div>
        </div>

        <div class="btn-group" id="options-container"></div>
    </div>

    <div class="cat-bad-popup" id="cat-bad">
        <img src="bad.jpg" alt="bad cat" onerror="this.style.display='none'">
        <p>Ай-я-яй!</p>
    </div>

    <div class="container" id="message-screen">
        <img id="msg-image" src="good.jpg" alt="good cat" onerror="this.style.display='none'">
        <h2 id="msg-title">Заголовок</h2>
        <p id="msg-desc">Описание</p>
        <button class="action-btn" onclick="startLevel()">Продолжить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const levelsData = [
            // Уровень 1
            [
                { pl: "Tak", ru: "Да" }, { pl: "Nie", ru: "Нет" }, { pl: "Proszę", ru: "Пожалуйста" }, { pl: "Dziękuję", ru: "Спасибо" },
                { pl: "Przepraszam", ru: "Извините" }, { pl: "Dzień dobry", ru: "Добрый день" }, { pl: "Dobry wieczór", ru: "Добрый вечер" },
                { pl: "Dobranoc", ru: "Спокойной ночи" }, { pl: "Cześć", ru: "Привет / Пока" }, { pl: "Do widzenia", ru: "До свидания" },
                { pl: "Pan", ru: "Господин" }, { pl: "Pani", ru: "Госпожа" }, { pl: "Imię", ru: "Имя" }, { pl: "Nazwisko", ru: "Фамилия" },
                { pl: "Człowiek", ru: "Человек" }, { pl: "Kobieta", ru: "Женщина" }, { pl: "Mężczyzna", ru: "Мужчина" }, { pl: "Dziecko", ru: "Ребенок" },
                { pl: "Dom", ru: "Дом" }, { pl: "Praca", ru: "Работа" }
            ],
            // Уровень 2
            [
                { pl: "Miasto", ru: "Город" }, { pl: "Ulica", ru: "Улица" }, { pl: "Samochód", ru: "Машина" }, { pl: "Autobus", ru: "Автобус" },
                { pl: "Pociąg", ru: "Поезд" }, { pl: "Bilet", ru: "Билет" }, { pl: "Pieniądze", ru: "Деньги" }, { pl: "Sklep", ru: "Магазин" },
                { pl: "Woda", ru: "Вода" }, { pl: "Jedzenie", ru: "Еда" }, { pl: "Chleb", ru: "Хлеб" }, { pl: "Mięso", ru: "Мясо" },
                { pl: "Mleko", ru: "Молоко" }, { pl: "Kawa", ru: "Кофе" }, { pl: "Herbata", ru: "Чай" }, { pl: "Śniadanie", ru: "Завтрак" },
                { pl: "Obiad", ru: "Обед" }, { pl: "Kolacja", ru: "Ужин" }, { pl: "Czas", ru: "Время" }, { pl: "Godzina", ru: "Час" }
            ]
            // --- СЮДА ПОТОМ ВСТАВИШЬ УРОВНИ С 3 ПО 50 (через запятую) ---
        ];

        const allWordsFlat = levelsData.flat();

        let currentTab = 'play';
        let currentLevel = parseInt(localStorage.getItem('polish_level')) || 0; 
        let mistakesDb = JSON.parse(localStorage.getItem('polish_mistakes')) || [];
        
        let levelWords = [];
        let wordIndex = 0;
        let mistakesMade = 0;
        let maxMistakes = 0;
        let isWaiting = false;

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-play').className = tab === 'play' ? 'tab active' : 'tab';
            document.getElementById('tab-mistakes').className = tab === 'mistakes' ? 'tab active' : 'tab';
            
            document.getElementById('message-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';

            if (tab === 'play') {
                startLevel();
            } else {
                startMistakesTrain();
            }
        }

        function startLevel() {
            if (currentLevel >= levelsData.length) {
                showMessage("Победа!", "Ты прошел все доступные уровни!", true, "Начать заново", resetProgress, true);
                return;
            }

            document.getElementById('message-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';

            maxMistakes = (currentLevel + 1) <= 20 ? 1 : 2;
            mistakesMade = 0;
            
            levelWords = shuffle([...levelsData[currentLevel]]);
            wordIndex = 0;
            
            updateHeader();
            nextWord();
        }

        function resetProgress() {
            localStorage.removeItem('polish_level');
            localStorage.removeItem('polish_mistakes');
            currentLevel = 0;
            mistakesDb = [];
            startLevel();
        }

        function startMistakesTrain() {
            if (mistakesDb.length === 0) {
                showMessage("Всё чисто!", "У тебя нет слов с ошибками. Ты машина.", false);
                return;
            }
            levelWords = shuffle([...mistakesDb]);
            wordIndex = 0;
            updateHeader();
            nextWord();
        }

        function updateHeader() {
            if (currentTab === 'play') {
                document.getElementById('stats').innerText = `УРОВЕНЬ ${currentLevel + 1} (${wordIndex}/${levelWords.length})`;
                let hearts = '';
                for(let i=0; i <= maxMistakes - mistakesMade; i++) hearts += '🤍';
                document.getElementById('lives').innerText = hearts;
            } else {
                document.getElementById('stats').innerText = `ОШИБКИ (${wordIndex}/${levelWords.length})`;
                document.getElementById('lives').innerText = '🔥';
            }
        }

        function nextWord() {
            if (wordIndex >= levelWords.length) {
                if (currentTab === 'play') {
                    currentLevel++;
                    localStorage.setItem('polish_level', currentLevel);
                    showMessage(`Уровень ${currentLevel} пройден!`, "Мяу-мяу-мяу!", true, "Дальше", startLevel, true);
                } else {
                    showMessage("Готово", "Ты повторил все сложные слова.", false);
                }
                return;
            }

            isWaiting = false;
            const currentWord = levelWords[wordIndex];
            
            const askRu = Math.random() > 0.5;
            const mainText = askRu ? currentWord.ru : currentWord.pl;
            const targetKey = askRu ? 'pl' : 'ru';

            document.getElementById('word').innerText = mainText;
            document.getElementById('word').dataset.lang = askRu ? 'ru-RU' : 'pl-PL';

            let wrongOptions = allWordsFlat.filter(w => w[targetKey] !== currentWord[targetKey]);
            wrongOptions = shuffle(wrongOptions).slice(0, 2);
            
            let options = shuffle([currentWord[targetKey], wrongOptions[0][targetKey], wrongOptions[1][targetKey]]);

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, currentWord, targetKey, askRu);
                container.appendChild(btn);
            });
            
            updateHeader();
        }

        function checkAnswer(btn, selected, currentWordObj, targetKey, wasRu) {
            if (isWaiting) return;
            isWaiting = true;

            const isCorrect = selected === currentWordObj[targetKey];

            if (isCorrect) {
                btn.classList.add('correct');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                
                if (wasRu) speakText(selected, 'pl-PL');

                if (currentTab === 'mistakes') {
                    mistakesDb = mistakesDb.filter(w => w.pl !== currentWordObj.pl);
                    localStorage.setItem('polish_mistakes', JSON.stringify(mistakesDb));
                }

                wordIndex++;
                setTimeout(nextWord, 800);
            } else {
                btn.classList.add('wrong');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                
                const badCat = document.getElementById('cat-bad');
                badCat.classList.add('show');
                setTimeout(() => badCat.classList.remove('show'), 1500);

                document.querySelectorAll('.option-btn').forEach(b => {
                    if (b.innerText === currentWordObj[targetKey]) b.classList.add('correct');
                });

                if (!mistakesDb.some(w => w.pl === currentWordObj.pl)) {
                    mistakesDb.push(currentWordObj);
                    localStorage.setItem('polish_mistakes', JSON.stringify(mistakesDb));
                }

                if (currentTab === 'play') {
                    mistakesMade++;
                    updateHeader();
                    
                    if (mistakesMade > maxMistakes) {
                        setTimeout(() => showMessage("Уровень провален", "Ай-я-яй! Начинаем уровень заново.", true, "Продолжить", startLevel, false), 1500);
                        return;
                    }
                }
                
                wordIndex++;
                setTimeout(nextWord, 1500);
            }
        }

        function showMessage(title, desc, showBtn, btnText = "Продолжить", btnAction = startLevel, isWin = false) {
            document.getElementById('game-container').style.display = 'none';
            const msgScreen = document.getElementById('message-screen');
            msgScreen.style.display = 'flex';
            
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-desc').innerText = desc;
            
            const btn = msgScreen.querySelector('button');
            btn.style.display = showBtn ? 'block' : 'none';
            btn.innerText = btnText;
            btn.onclick = btnAction;

            const img = document.getElementById('msg-image');
            img.style.display = isWin ? 'block' : 'none';
        }

        function speakWord() {
            const el = document.getElementById('word');
            speakText(el.innerText, el.dataset.lang);
        }

        function speakText(text, lang) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        switchTab('play');
    </script>
</body>
</html>
