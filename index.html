<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polski Trener Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0B0F19;
            --card-bg: #151A27;
            --text-main: #FFFFFF;
            --text-muted: #64748B;
            --accent: #3B82F6;
            --correct: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --btn-bg: #1E293B;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 15, 25, 0.85);
            z-index: -1;
        }

        /* Главные табы */
        .tabs { display: flex; width: 100%; background: #0F172A; border-bottom: 1px solid #1E293B; position: fixed; top: 0; z-index: 10; }
        .tab { flex: 1; padding: 16px 0; text-align: center; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: 0.2s; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 1px; }
        .tab.active { color: var(--text-main); border-bottom: 2px solid var(--accent); }

        .container { width: 90%; max-width: 400px; text-align: center; margin-top: 70px; display: flex; flex-direction: column; justify-content: center; padding-bottom: 80px; }
        
        /* Табы режимов */
        .mode-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .mode-btn { background: var(--btn-bg); color: var(--text-muted); border: 1px solid #1E293B; padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 10px; }
        .stats { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }
        .lives { color: var(--error); font-size: 1.2rem; letter-spacing: 2px; }

        /* Таймер Спринта */
        .timer-container { width: 100%; height: 6px; background: #0F172A; border-radius: 3px; overflow: hidden; margin-bottom: 20px; display: none; }
        .timer-bar { height: 100%; width: 100%; float: right; background: var(--correct); } /* float: right делает убывание справа налево */

        .word-card { background: var(--card-bg); padding: 40px 20px; border-radius: 20px; border: 1px solid #1E293B; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 140px;}
        .word-card h1 { margin: 0; font-size: 2.2rem; font-weight: 700; letter-spacing: -0.02em; cursor: pointer; }

        .speaker-icon { margin-top: 15px; font-size: 1.5rem; cursor: pointer; opacity: 0.6; transition: 0.2s; background: #1E293B; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .speaker-icon:active { transform: scale(0.9); opacity: 1; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button.option-btn { border: 1px solid #1E293B; padding: 18px 20px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; background: var(--btn-bg); color: #FFFFFF; transition: transform 0.1s ease, background 0.2s, border-color 0.2s; width: 100%; }
        button.option-btn:active { transform: scale(0.96); }

        .correct { background: rgba(16, 185, 129, 0.1) !important; border-color: var(--correct) !important; color: var(--correct) !important; }
        .wrong { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; background: rgba(239, 68, 68, 0.1) !important; border-color: var(--error) !important; color: var(--error) !important; }

        /* Плавающая кнопка Ошибок (FAB) */
        .fab-mistakes { position: fixed; bottom: 20px; right: 20px; background: rgba(239, 68, 68, 0.15); border: 1px solid var(--error); color: var(--error); padding: 12px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; cursor: pointer; z-index: 50; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2); transition: 0.2s; }
        .fab-mistakes:active { transform: scale(0.95); }

        /* Попап для ошибки (Кот) */
        .cat-bad-popup { position: fixed; bottom: 80px; right: 20px; width: 110px; background: var(--card-bg); border-radius: 16px; padding: 10px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid var(--error); transform: translateY(200%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; }
        .cat-bad-popup.show { transform: translateY(0); }
        .cat-bad-popup img { width: 100%; border-radius: 10px; }
        .cat-bad-popup p { margin: 8px 0 0; font-size: 0.9rem; font-weight: bold; color: var(--error); }

        /* Экран статистики */
        #stats-page { display: none; flex-direction: column; gap: 15px; margin-top: 20px;}
        .stat-box { background: #1E293B; padding: 20px; border-radius: 16px; border: 1px solid #334155; text-align: left; }
        .stat-box h3 { margin: 0 0 10px 0; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-box .value { font-size: 2rem; font-weight: bold; color: #fff; margin: 0; }
        .stat-box .highlight { color: var(--accent); }

        #message-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 60vh; }
        #msg-image { width: 160px; height: 160px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; display: none; border: 3px solid var(--correct); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2); }
        #message-screen h2 { font-size: 2rem; margin-bottom: 10px; }
        #message-screen p { color: var(--text-muted); margin-bottom: 30px; text-align: center; }
        .action-btn { background: var(--accent); color: #fff; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" id="tab-play" onclick="switchTab('play')">Прогресс</div>
        <div class="tab" id="tab-stats" onclick="switchTab('stats')">Статистика</div>
    </div>

    <div class="container" id="game-container">
        
        <div class="mode-tabs" id="mode-tabs">
            <button class="mode-btn active" id="btn-classic" onclick="setMode('classic')">Классика</button>
            <button class="mode-btn" id="btn-sprint" onclick="setMode('sprint')">Спринт</button>
            <button class="mode-btn" id="btn-audio" onclick="setMode('audio')">Аудио</button>
        </div>

        <div class="header-info">
            <div class="stats" id="stats-header">УРОВЕНЬ 1 (0/20)</div>
            <div class="lives" id="lives">🤍🤍</div>
        </div>
        
        <div class="timer-container" id="timer-container">
            <div class="timer-bar" id="timer-bar"></div>
        </div>

        <div class="word-card" id="card">
            <h1 id="word" onclick="speakWord()">Dom</h1>
            <div class="speaker-icon" onclick="speakWord()">🔊</div>
        </div>

        <div class="btn-group" id="options-container"></div>
    </div>

    <div class="container" id="stats-page">
        <div class="stat-box">
            <h3>Текущий уровень</h3>
            <p class="value highlight" id="st-level">1</p>
        </div>
        <div class="stat-box">
            <h3>Пройдено слов</h3>
            <p class="value" id="st-words">0</p>
        </div>
        <div class="stat-box">
            <h3>Слов в базе ошибок</h3>
            <p class="value" style="color: var(--error);" id="st-mistakes">0</p>
        </div>
    </div>

    <div class="fab-mistakes" id="fab-mistakes" onclick="startMistakesTrain()">
        🔥 Ошибки (<span id="fab-count">0</span>)
    </div>

    <div class="cat-bad-popup" id="cat-bad">
        <img src="bad.jpg" alt="bad cat" onerror="this.style.display='none'">
        <p>Ай-я-яй!</p>
    </div>

    <div class="container" id="message-screen">
        <img id="msg-image" src="good.jpg" alt="good cat" onerror="this.style.display='none'">
        <h2 id="msg-title">Заголовок</h2>
        <p id="msg-desc">Описание</p>
        <button class="action-btn" onclick="returnToPlay()">Продолжить</button>
    </div>

            [ {pl:"Natychmiast",ru:"Немедленно"},{pl:"Ostatecznie",ru:"В конечном итоге"},{pl:"Prawdopodobnie",ru:"Вероятно"},{pl:"Oczywiście",ru:"Конечно"},{pl:"Całkowicie",ru:"Полностью"},{pl:"Częściowo",ru:"Частично"},{pl:"Znacznie",ru:"Значительно"},{pl:"Niewiele",ru:"Немного"},{pl:"Zbyt",ru:"Слишком"},{pl:"Wystarczająco",ru:"Достаточно"},{pl:"Niemal",ru:"Почти"},{pl:"Ledwie",ru:"Едва"},{pl:"Głównie",ru:"Главным образом"},{pl:"Wyłącznie",ru:"Исключительно"},{pl:"Szczególnie",ru:"Особенно"},{pl:"Powszechnie",ru:"Повсеместно"},{pl:"Zupełnie",ru:"Совершенно"},{pl:"Nagminnie",ru:"Сплошь и рядом"},{pl:"Stopniowo",ru:"Постепенно"},{pl:"Zaraz",ru:"Сейчас / Скоро"} ],
            [ {pl:"Zapominać",ru:"Забывать (не запоминать)"},{pl:"Pamiętać",ru:"Помнить (не память)"},{pl:"Grzeczny",ru:"Вежливый (не грешный)"},{pl:"Uroda",ru:"Красота (не уродство)"},{pl:"Czaszka",ru:"Череп (не чашка)"},{pl:"Kubek",ru:"Кружка (не кубок)"},{pl:"Dworzec",ru:"Вокзал (не дворец)"},{pl:"Dywan",ru:"Ковер (не диван)"},{pl:"Sklep",ru:"Магазин (не склеп)"},{pl:"Krzesło",ru:"Стул (не кресло)"},{pl:"Fotel",ru:"Кресло (не стул)"},{pl:"Pensja",ru:"Зарплата (не пенсия)"},{pl:"Emerytura",ru:"Пенсия (не увольнение)"},{pl:"Krawat",ru:"Галстук (не кровать)"},{pl:"Łóżko",ru:"Кровать (не ложка)"},{pl:"Łyżka",ru:"Ложка"},{pl:"Prosto",ru:"Прямо (не просто)"},{pl:"Zwykły",ru:"Обычный (не привычный)"},{pl:"Pukać",ru:"Стучать (не пукать)"},{pl:"Woń",ru:"Аромат (не вонь)"} ]
        ];

        const allWordsFlat = levelsData.flat();

        // Статистика в локальном хранилище
        let stats = JSON.parse(localStorage.getItem('polish_stats')) || { words: 0, mistakesTotal: 0 };
        let mistakesDb = JSON.parse(localStorage.getItem('polish_mistakes')) || [];
        let currentLevel = parseInt(localStorage.getItem('polish_level')) || 0; 
        
        let currentMode = 'classic'; // 'classic', 'sprint', 'audio'
        let isMistakeMode = false;
        
        let levelWords = [];
        let wordIndex = 0;
        let mistakesMade = 0;
        let maxMistakes = 0;
        let isWaiting = false;

        // Переменные для таймера
        let timerInterval;
        let timeDuration = 7000; // 7 секунд на слово в спринте

        function updateStatsUI() {
            document.getElementById('st-level').innerText = currentLevel + 1;
            document.getElementById('st-words').innerText = stats.words;
            document.getElementById('st-mistakes').innerText = mistakesDb.length;
            document.getElementById('fab-count').innerText = mistakesDb.length;
            
            if (mistakesDb.length > 0) {
                document.getElementById('fab-mistakes').style.display = 'flex';
            } else {
                document.getElementById('fab-mistakes').style.display = 'none';
            }
        }

        function switchTab(tab) {
            document.getElementById('tab-play').className = tab === 'play' ? 'tab active' : 'tab';
            document.getElementById('tab-stats').className = tab === 'stats' ? 'tab active' : 'tab';
            
            document.getElementById('message-screen').style.display = 'none';
            document.getElementById('cat-bad').classList.remove('show');

            if (tab === 'stats') {
                clearInterval(timerInterval);
                document.getElementById('game-container').style.display = 'none';
                document.getElementById('stats-page').style.display = 'flex';
                updateStatsUI();
            } else {
                document.getElementById('stats-page').style.display = 'none';
                document.getElementById('game-container').style.display = 'flex';
                
                // Если мы вернулись во вкладку Прогресс из Ошибок, выключаем режим ошибок
                if (isMistakeMode) {
                    isMistakeMode = false;
                    document.getElementById('mode-tabs').style.display = 'flex';
                    startLevel();
                } else {
                    nextWord(); // Продолжаем где остановились
                }
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-classic').className = mode === 'classic' ? 'mode-btn active' : 'mode-btn';
            document.getElementById('btn-sprint').className = mode === 'sprint' ? 'mode-btn active' : 'mode-btn';
            document.getElementById('btn-audio').className = mode === 'audio' ? 'mode-btn active' : 'mode-btn';
            
            document.getElementById('timer-container').style.display = mode === 'sprint' ? 'block' : 'none';
            
            clearInterval(timerInterval);
            nextWord();
        }

        function startLevel() {
            if (currentLevel >= levelsData.length) {
                showMessage("Победа!", "Ты прошел все 1000 слов! Настоящий поляк.", true, "Начать заново", resetProgress, true);
                return;
            }

            maxMistakes = (currentLevel + 1) <= 20 ? 1 : 2;
            mistakesMade = 0;
            levelWords = shuffle([...levelsData[currentLevel]]);
            wordIndex = 0;
            
            updateHeader();
            updateStatsUI();
            nextWord();
        }

        function startMistakesTrain() {
            if (mistakesDb.length === 0) return;
            isMistakeMode = true;
            
            document.getElementById('mode-tabs').style.display = 'none';
            document.getElementById('timer-container').style.display = 'none';
            clearInterval(timerInterval);

            switchTab('play'); // Переключаемся на игровой экран, но с логикой ошибок

            levelWords = shuffle([...mistakesDb]);
            wordIndex = 0;
            updateHeader();
            nextWord();
        }

        function resetProgress() {
            localStorage.removeItem('polish_level');
            localStorage.removeItem('polish_mistakes');
            localStorage.removeItem('polish_stats');
            currentLevel = 0;
            mistakesDb = [];
            stats = { words: 0, mistakesTotal: 0 };
            startLevel();
        }

        function updateHeader() {
            if (!isMistakeMode) {
                document.getElementById('stats-header').innerText = `УРОВЕНЬ ${currentLevel + 1} (${wordIndex}/${levelWords.length})`;
                let hearts = '';
                for(let i=0; i <= maxMistakes - mistakesMade; i++) hearts += '🤍';
                document.getElementById('lives').innerText = hearts;
            } else {
                document.getElementById('stats-header').innerText = `ОШИБКИ (${wordIndex}/${levelWords.length})`;
                document.getElementById('lives').innerText = '🔥';
            }
        }

        function startSprintTimer(currentWordObj, targetKey) {
            let start = Date.now();
            let bar = document.getElementById('timer-bar');
            bar.style.transition = 'none';
            bar.style.width = '100%';
            bar.style.backgroundColor = 'var(--correct)';

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let elapsed = Date.now() - start;
                let remaining = timeDuration - elapsed;
                
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    bar.style.width = '0%';
                    // Время вышло - считаем как неверный ответ
                    processAnswer(null, null, currentWordObj, targetKey, false, true);
                } else {
                    let percent = (remaining / timeDuration) * 100;
                    bar.style.width = percent + '%';
                    if (percent < 30) bar.style.backgroundColor = 'var(--error)';
                    else if (percent < 60) bar.style.backgroundColor = 'var(--warning)';
                }
            }, 50);
        }

        function nextWord() {
            if (wordIndex >= levelWords.length) {
                clearInterval(timerInterval);
                if (!isMistakeMode) {
                    currentLevel++;
                    localStorage.setItem('polish_level', currentLevel);
                    showMessage(`Уровень ${currentLevel} пройден!`, "Мяу-мяу-мяу!", true, "Дальше", startLevel, true);
                } else {
                    showMessage("Готово", "Все ошибки отработаны.", true, "В меню", () => { isMistakeMode = false; document.getElementById('mode-tabs').style.display = 'flex'; startLevel(); }, false);
                }
                return;
            }

            isWaiting = false;
            const currentWord = levelWords[wordIndex];
            
            const askRu = Math.random() > 0.5;
            const mainText = askRu ? currentWord.ru : currentWord.pl;
            const targetKey = askRu ? 'pl' : 'ru';

            const wordEl = document.getElementById('word');
            wordEl.dataset.lang = askRu ? 'ru-RU' : 'pl-PL';
            wordEl.dataset.text = mainText; // Сохраняем текст для озвучки
            
            // Логика режима Аудио
            if (currentMode === 'audio' && !isMistakeMode) {
                wordEl.innerText = '🎧';
                speakWord(); // Автоматически читаем
            } else {
                wordEl.innerText = mainText;
            }

            // Генерируем ответы
            let wrongOptions = allWordsFlat.filter(w => w[targetKey] !== currentWord[targetKey]);
            wrongOptions = shuffle(wrongOptions).slice(0, 2);
            let options = shuffle([currentWord[targetKey], wrongOptions[0][targetKey], wrongOptions[1][targetKey]]);

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => processAnswer(btn, opt, currentWord, targetKey, askRu, false);
                container.appendChild(btn);
            });
            
            updateHeader();

            if (currentMode === 'sprint' && !isMistakeMode) {
                startSprintTimer(currentWord, targetKey);
            }
        }

        function processAnswer(btn, selected, currentWordObj, targetKey, wasRu, isTimeOut) {
            if (isWaiting) return;
            isWaiting = true;
            clearInterval(timerInterval); // Останавливаем таймер

            const isCorrect = !isTimeOut && (selected === currentWordObj[targetKey]);

            if (isCorrect) {
                btn.classList.add('correct');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                if (wasRu) speakText(selected, 'pl-PL');

                if (isMistakeMode) {
                    mistakesDb = mistakesDb.filter(w => w.pl !== currentWordObj.pl);
                    localStorage.setItem('polish_mistakes', JSON.stringify(mistakesDb));
                } else {
                    stats.words++;
                    localStorage.setItem('polish_stats', JSON.stringify(stats));
                }

                updateStatsUI();
                wordIndex++;
                setTimeout(nextWord, 800);
            } else {
                if (btn) btn.classList.add('wrong');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                
                // Кот Ай-я-яй
                const badCat = document.getElementById('cat-bad');
                badCat.classList.add('show');
                setTimeout(() => badCat.classList.remove('show'), 1500);

                // Подсветка правильного
                document.querySelectorAll('.option-btn').forEach(b => {
                    if (b.innerText === currentWordObj[targetKey]) b.classList.add('correct');
                });

                // Добавление в ошибки
                if (!mistakesDb.some(w => w.pl === currentWordObj.pl)) {
                    mistakesDb.push(currentWordObj);
                    localStorage.setItem('polish_mistakes', JSON.stringify(mistakesDb));
                    stats.mistakesTotal++;
                    localStorage.setItem('polish_stats', JSON.stringify(stats));
                }

                updateStatsUI();

                if (!isMistakeMode) {
                    mistakesMade++;
                    updateHeader();
                    if (mistakesMade > maxMistakes) {
                        setTimeout(() => showMessage("Уровень провален", isTimeOut ? "Время вышло!" : "Слишком много ошибок.", true, "Заново", startLevel, false), 1500);
                        return;
                    }
                }
                
                wordIndex++;
                setTimeout(nextWord, 1500);
            }
        }

        function showMessage(title, desc, showBtn, btnText, btnAction, isWin) {
            document.getElementById('game-container').style.display = 'none';
            const msgScreen = document.getElementById('message-screen');
            msgScreen.style.display = 'flex';
            
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-desc').innerText = desc;
            
            const btn = msgScreen.querySelector('button');
            btn.style.display = showBtn ? 'block' : 'none';
            btn.innerText = btnText;
            btn.onclick = btnAction;

            const img = document.getElementById('msg-image');
            img.style.display = isWin ? 'block' : 'none';
        }

        function returnToPlay() {
            document.getElementById('message-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
        }

        function speakWord() {
            const el = document.getElementById('word');
            speakText(el.dataset.text, el.dataset.lang);
        }

        function speakText(text, lang) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Запуск
        updateStatsUI();
        startLevel();
    </script>
